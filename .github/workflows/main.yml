name: Masoud Final Fix Build

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Files
        run: |
          # تحميل الملفات الأساسية
          curl -sO https://raw.githubusercontent.com/facebook/fishhook/main/fishhook.h
          curl -sO https://raw.githubusercontent.com/facebook/fishhook/main/fishhook.c
          
          # سكريبت الصهر (تأكدت من إضافة كل الرموز)
          python3 - << 'EOF'
          def melt(text, key=0x55):
              return ", ".join([hex(ord(c) ^ key) for c in text]) + ", 0x0"
          
          data = {"S_BYPASS": "ShadowBypass", "S_DLSYM": "dlsym"}
          with open("Melted.h", "w") as f:
              f.write("#ifndef MELTED_H\n#define MELTED_H\n")
              for k, v in data.items():
                  f.write(f"static const unsigned char {k}[] = {{ {melt(v)} }};\n")
              f.write("#endif")
          EOF

      - name: Create Tweak Code
        run: |
          cat << 'EOF' > Tweak.mm
          #import <Foundation/Foundation.h>
          #import <mach-o/dyld.h>
          #import <sys/mman.h>
          #import <dlfcn.h>
          #import <stdlib.h>
          #import <unistd.h>
          #import "fishhook.h"
          #import "Melted.h"

          // دالة فك التشفير
          char* decrypt(const unsigned char* in) {
              size_t l=0; while(in[l]!=0x0) l++;
              char* o=(char*)malloc(l+1);
              for(size_t i=0;i<l;i++) o[i]=in[i]^0x55;
              o[l]='\0'; return o;
          }

          // دالة الباتش للذاكرة
          void patch(uintptr_t address) {
              size_t ps = sysconf(_SC_PAGESIZE);
              uintptr_t start = address & ~(ps - 1);
              if (mprotect((void*)start, ps, PROT_READ | PROT_WRITE | PROT_EXEC) == 0) {
                  memcpy((void*)address, "\x1F\x20\x03\xD5", 4);
              }
          }

          __attribute__((constructor)) static void init() {
              // تأخير 20 ثانية
              dispatch_after(dispatch_after_time(DISPATCH_TIME_NOW, 20LL * NSEC_PER_SEC), dispatch_get_main_queue(), ^{
                  intptr_t slide = _dyld_get_image_vmaddr_slide(0);
                  
                  // تطبيق الباتشات بالأوفستات الخاصة بك
                  patch(slide + 0x100000000 + 0x68F2720); 
                  patch(slide + 0x100000000 + 0x68F0BC0);
                  
                  NSLog(@"[+] Masoud Bypass Applied Successfully!");
              });
          }
          EOF

      - name: Compile with Xcode Clang++
        run: |
          # استخدام clang++ لضمان توافق الـ Objective-C++
          xcrun -sdk iphoneos clang++ -dynamiclib -arch arm64 \
            -miphoneos-version-min=12.0 -O3 -flto \
            -fobjc-arc -lc++ \
            -Wl,-dead_strip -Wl,-x \
            Tweak.mm fishhook.c -o MasoudBypass.dylib \
            -framework Foundation -framework UIKit -I.

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Masoud-Dylib-Final
          path: "*.dylib"
