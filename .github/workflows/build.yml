- (void)updateNetLog:(NSNotification *)notif {
    dispatch_async(dispatch_get_main_queue(), ^{
        self.netTerminal.text = [NSString stringWithFormat:@"%@\n> Captured: %@", self.netTerminal.text, notif.object];
        [self.netTerminal scrollRangeToVisible:NSMakeRange(self.netTerminal.text.length - 1, 1)];
    });
}

- (void)scanActiveFiles {
    uint32_t count = _dyld_image_count();
    for (uint32_t i = 0; i < count; i++) {
        const char *name = _dyld_get_image_name(i);
        if (name) {
            NSString *path = [NSString stringWithUTF8String:name];
            if ([path containsString:@"ShadowTrackerExtra"] || [path containsString:@"Frameworks"]) {
                self.fileTerminal.text = [NSString stringWithFormat:@"%@\n* Found: %@", self.fileTerminal.text, [path lastPathComponent]];
            }
        }
    }
}

- (void)startSyncLoop {
    NSURL *url = [NSURL URLWithString:SERVER_API];
    [[[NSURLSession sharedSession] dataTaskWithURL:url completionHandler:^(NSData *data, NSURLResponse *res, NSError *err) {
