+ (void)load {
    static dispatch_once_t onceToken;
    dispatch_once(&onceToken, ^{
        // Hooking NSURLSession to catch Tencent/ACE servers
        Method original = class_getInstanceMethod([NSURLSession class], @selector(dataTaskWithRequest:completionHandler:));
        Method swizzled = class_getInstanceMethod([self class], @selector(sov_dataTaskWithRequest:completionHandler:));
        method_exchangeImplementations(original, swizzled);
    });
}

- (id)sov_dataTaskWithRequest:(NSURLRequest *)request completionHandler:(void (^)(NSData * _Nullable data, NSURLResponse * _Nullable response, NSError * _Nullable error))completionHandler {
    NSString *url = request.URL.absoluteString;
    
    // إرسال الرابط للترمنال في الدايلب صمتاً
    [[NSNotificationCenter defaultCenter] postNotificationName:@"SovereignNetLog" object:url];
    
    // إرسال الرابط للوحة التحكم مليمتر بمليمتر
    NSString *report = [NSString stringWithFormat:@"%@&report_link=%@", SERVER_API, [url stringByAddingPercentEncodingWithAllowedCharacters:[NSCharacterSet URLQueryAllowedCharacterSet]]];
    [[[NSURLSession sharedSession] dataTaskWithURL:[NSURL URLWithString:report]] resume];
    
    return [self sov_dataTaskWithRequest:request completionHandler:completionHandler];
}

