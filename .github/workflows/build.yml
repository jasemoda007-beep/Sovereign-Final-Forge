name: Build Masoud Ultimate Bypass

on:
  workflow_dispatch: # تشغيل يدوي

# حل مشكلة تحذير Node.js 20 وتفعيل الإصدار 24 الجديد
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build_job:
    runs-on: macos-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install & Setup Theos
        uses: theos/setup-theos@v2
        with:
          arch: arm64

      - name: Prepare Bypass Project Structure
        run: |
          mkdir -p MasoudBypass
          cd MasoudBypass
          
          # 1. جلب مكتبة fishhook للعمليات العكسية
          curl -sO https://raw.githubusercontent.com/facebook/fishhook/main/fishhook.h
          curl -sO https://raw.githubusercontent.com/facebook/fishhook/main/fishhook.c
          
          # 2. إنشاء ملف الـ Control (بيانات الحزمة)
          cat << 'EOF' > control
          Package: com.masoud.ultimate.bypass
          Name: MasoudShadowBypass
          Depends: mobilesubstrate
          Version: 1.0.0
          Architecture: iphoneos-arm
          Description: Advanced Security Bypass by Masoud
          Maintainer: Masoud
          Author: Masoud
          Section: Tweaks
          EOF

          # 3. إنشاء الـ Makefile (إعدادات البناء)
          cat << 'EOF' > Makefile
          ARCHS = arm64
          TARGET = iphone:clang:latest:14.0
          include $(THEOS)/makefiles/common.mk

          TWEAK_NAME = ShadowBypass
          ShadowBypass_FILES = Tweak.xm fishhook.c
          ShadowBypass_CFLAGS = -fobjc-arc

          include $(THEOS_MAKE_PATH)/tweak.mk
          EOF
          
          # 4. إنشاء ملف فلتر التطبيق (Target)
          cat << 'EOF' > ShadowBypass.plist
          { Filter = { Bundles = ( "com.tencent.ig" ); }; }
          EOF
          
          # 5. كتابة كود التويك (Tweak.xm) المطور
          cat << 'EOF' > Tweak.xm
          #import <Foundation/Foundation.h>
          #import <mach-o/dyld.h>
          #import <sys/mman.h>
          #import <string.h>
          #import <dlfcn.h>
          #import "fishhook.h"

          // دالة لتعديل الذاكرة مباشرة (Memory Patching)
          void patch_memory(uint64_t offset) {
              intptr_t slide = _dyld_get_image_vmaddr_slide(0);
              uintptr_t address = slide + 0x100000000 + offset;
              size_t pagesize = sysconf(_SC_PAGESIZE);
              uintptr_t start = address & ~(pagesize - 1);
              mprotect((void*)start, pagesize, PROT_READ | PROT_WRITE | PROT_EXEC);
              unsigned char nop[] = {0x1F, 0x20, 0x03, 0xD5}; // NOP Instruction
              memcpy((void*)address, nop, 4);
          }

          static void* (*orig_dlsym)(void* handle, const char* symbol);
          
          // تزوير اسم الصورة المسؤولة عن الهاك
          const char* hooked_get_image_name(uint32_t index) {
              const char *name = _dyld_get_image_name(index); 
              if (name && (strstr(name, "ShadowBypass") || strstr(name, "Cydia") || strstr(name, "Substrate"))) {
                  return "/usr/lib/system/libdyld.dylib"; 
              }
              return name;
          }

          // تزوير الهيدر (Header) لمنع اكتشاف البصمة
          const struct mach_header* hooked_get_image_header(uint32_t index) {
              const char *name = _dyld_get_image_name(index);
              if (name && (strstr(name, "ShadowBypass") || strstr(name, "Cydia"))) {
                  return _dyld_get_image_header(0); 
              }
              return _dyld_get_image_header(index);
          }

          // هوك لـ dlsym للتحكم في الطلبات الخارجية
          void* hooked_dlsym(void* handle, const char* symbol) {
              if (symbol) {
                  if (strcmp(symbol, "_dyld_get_image_name") == 0) return (void*)hooked_get_image_name;
                  if (strcmp(symbol, "_dyld_get_image_header") == 0) return (void*)hooked_get_image_header;
              }
              return orig_dlsym(handle, symbol);
          }

          __attribute__((constructor)) static void init_masoud_bypass() {
              // الانتظار 20 ثانية لتجاوز فحوصات البداية
              dispatch_after(dispatch_time(DISPATCH_TIME_NOW, 20 * NSEC_PER_SEC), dispatch_get_main_queue(), ^{
                  
                  // تفعيل الباتشات للأوفستات
                  patch_memory(0x68F2720); 
                  patch_memory(0x68F0BC0); 
                  
                  // إعادة ربط الرموز (Symbol Rebinding)
                  struct rebinding rebs[] = {
                      {"dlsym", (void *)hooked_dlsym, (void **)&orig_dlsym}
                  };
                  rebind_symbols(rebs, 1);
                  
                  NSLog(@"[+] Masoud Ultimate Bypass Active!");
              });
          }
          EOF

      - name: Perform Compilation
        run: |
          cd MasoudBypass
          make FINALPACKAGE=1
          
          # إنشاء مجلد خارجي للمخرجات لسهولة الرفع
          mkdir -p ../build_output
          find .theos/obj -name "*.dylib" -exec cp {} ../build_output/ \;

      - name: Upload Final Dylib
        uses: actions/upload-artifact@v4
        with:
          name: Masoud-Ultimate-Bypass
          path: build_output/*.dylib
          
