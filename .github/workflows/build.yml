/**
 * نظام Sovereign Static Weapon v600k (Elite Bridge Edition)
 * المصمم: المهندس وسام الصافي - البصرة / الناصرية
 * التقنية: Hybrid Hooking (Internal + Substrate Bridge)
 * الوظيفة: الحقن المليمتري مع ضمان عدم الكراش على الأجهزة بدون جلبريك.
 */

#import <UIKit/UIKit.h>
#import <mach-o/dyld.h>
#import <mach/mach.h>
#import <Foundation/Foundation.h>
#import <dlfcn.h> // لاستدعاء الجسور الخارجية

// [🎯] إحداثيات مركز القيادة
#define SERVER_API @"http://jojolmlm.hopto.org/dashboard_v60.php?api=true"

@interface SovereignStaticUI : UIView
@property (nonatomic, strong) UILabel *statusLabel;
@property (nonatomic, strong) UIView *statusLamp;
@end

@implementation SovereignStaticUI

- (instancetype)initWithFrame:(CGRect)frame {
    self = [super initWithFrame:frame];
    if (self) {
        // [التصميم السيادي الثابت]
        self.backgroundColor = [[UIColor blackColor] colorWithAlphaComponent:0.85];
        self.layer.cornerRadius = 15;
        self.layer.borderColor = [UIColor cyanColor].CGColor;
        self.layer.borderWidth = 1.5;
        
        self.statusLabel = [[UILabel alloc] initWithFrame:CGRectMake(15, 8, 190, 20)];
        self.statusLabel.text = @"جاري فحص جسر السيديا...";
        self.statusLabel.textColor = [UIColor whiteColor];
        self.statusLabel.font = [UIFont boldSystemFontOfSize:10];
        self.statusLabel.textAlignment = NSTextAlignmentCenter;
        [self addSubview:self.statusLabel];
        
        self.statusLamp = [[UIView alloc] initWithFrame:CGRectMake(10, 12, 12, 12)];
        self.statusLamp.backgroundColor = [UIColor yellowColor];
        self.statusLamp.layer.cornerRadius = 6;
        [self addSubview:self.statusLamp];

        // [تكتيك التحديث باللمس]
        UITapGestureRecognizer *tap = [[UITapGestureRecognizer alloc] initWithTarget:self action:@selector(manualUpdate)];
        [self addGestureRecognizer:tap];
        self.userInteractionEnabled = YES;

        [self checkBridgeAndSync];
    }
    return self;
}

- (void)manualUpdate {
    [UIView animateWithDuration:0.2 animations:^{ self.alpha = 0.3; } completion:^(BOOL f){ self.alpha = 1.0; }];
    [self fetchAndDeploy];
}

// =========================================================
// [🛡️] محرك فحص الجسر (Bridge Detector)
// يتحقق هل تم دمج libsubstrate.dylib داخل الـ IPA
// =========================================================
- (void)checkBridgeAndSync {
    void *substrateHandle = dlopen("libsubstrate.dylib", RTLD_NOW);
    if (substrateHandle) {
        NSLog(@"[Sovereign] Bridge Spotted! Jailbreak Logic Active.");
        self.statusLabel.text = @"تم الالتحام بجسر السيديا ✅";
        self.statusLamp.backgroundColor = [UIColor cyanColor];
    } else {
        NSLog(@"[Sovereign] No Bridge. Using Internal Patch Engine.");
        self.statusLabel.text = @"محرك الحقن الداخلي نشط";
    }
    
    [self fetchAndDeploy];
}

// =========================================================
// [⚙️] محرك الحقن المصفح ضد الانهيار (Anti-Crash Engine)
// =========================================================
- (void)executeSovereignPatch:(NSArray *)offsets {
    uintptr_t shadowBase = _dyld_get_image_vmaddr_slide(0);
    uintptr_t anogsBase = 0;
    
    // رصد مسار الأنكوس مليمتر بمليمتر
    uint32_t count = _dyld_image_count();
    for (uint32_t i = 0; i < count; i++) {
        const char *name = _dyld_get_image_name(i);
        if (name && strstr(name, "anogs")) {
            anogsBase = _dyld_get_image_vmaddr_slide(i);
            break;
        }
    }

    mach_port_t task = mach_task_self();

    for (NSDictionary *off in offsets) {
        uintptr_t addr = strtoull([off[@"address"] UTF8String], NULL, 16);
        NSString *targetStr = off[@"target"];
        uintptr_t slide = ([targetStr containsString:@"anogs"]) ? anogsBase : shadowBase;

        if (slide == 0 && [targetStr containsString:@"anogs"]) continue;

        uintptr_t targetAddr = slide + addr;
        NSString *hexStr = off[@"hex"];
        
        // تحويل الهيكس لبايتات
        NSMutableData *data = [NSMutableData data];
        for (int i = 0; i + 2 <= hexStr.length; i += 2) {
            unsigned int v;
            [[NSScanner scannerWithString:[hexStr substringWithRange:NSMakeRange(i, 2)]] scanHexInt:&v];
            unsigned char c = (unsigned char)v;
            [data appendBytes:&c length:1];
        }

        // [الدرع المليمتري]: كسر الحماية بأمان قسري
        // استخدام VM_PROT_COPY يمنع الكراش في الأجهزة بدون جلبريك
        kern_return_t kr = vm_protect(task, (vm_address_t)targetAddr, data.length, FALSE, VM_PROT_READ | VM_PROT_WRITE | VM_PROT_COPY);
        
        if (kr == KERN_SUCCESS) {
            vm_write(task, (vm_address_t)targetAddr, (vm_offset_t)data.bytes, (mach_msg_type_number_t)data.length);
            vm_protect(task, (vm_address_t)targetAddr, data.length, FALSE, VM_PROT_READ | VM_PROT_EXECUTE);
        }
    }
}

- (void)fetchAndDeploy {
    NSURL *url = [NSURL URLWithString:SERVER_API];
    [[[NSURLSession sharedSession] dataTaskWithURL:url completionHandler:^(NSData *data, NSURLResponse *res, NSError *err) {
        dispatch_async(dispatch_get_main_queue(), ^{
            if (err || !data) {
                self.statusLabel.text = @"الرادار معطل! (المس للتحديث)";
                self.statusLamp.backgroundColor = [UIColor redColor];
                return;
            }
            NSDictionary *json = [NSJSONSerialization JSONObjectWithData:data options:0 error:nil];
            if (!json) return;

            if ([json[@"system_status"] isEqualToString:@"safe"]) {
                [self executeSovereignPatch:json[@"active_offsets"]];
                self.statusLabel.text = json[@"notification"];
                self.statusLabel.textColor = [UIColor greenColor];
                self.statusLamp.backgroundColor = [UIColor greenColor];
                self.layer.borderColor = [UIColor greenColor].CGColor;
            } else {
                self.statusLabel.text = @"🛑 النظام مكشوف!";
                self.statusLabel.textColor = [UIColor redColor];
                self.statusLamp.backgroundColor = [UIColor redColor];
            }
        });
    }] resume];
}

@end

void __attribute__((constructor)) start_v600k_system() {
    dispatch_after(dispatch_time(DISPATCH_TIME_NOW, (int64_t)(5 * NSEC_PER_SEC)), dispatch_get_main_queue(), ^{
        UIWindow *win = nil;
        if (@available(iOS 13.0, *)) {
            for (UIWindowScene* scene in [UIApplication sharedApplication].connectedScenes) {
                if (scene.activationState == UISceneActivationStateForegroundActive) {
                    win = scene.windows.firstObject; break;
                }
            }
        }
        if (!win) win = [UIApplication sharedApplication].keyWindow;
        
        if (win) {
            CGFloat sw = [UIScreen mainScreen].bounds.size.width;
            SovereignStaticUI *ui = [[SovereignStaticUI alloc] initWithFrame:CGRectMake(sw/2 - 110, 45, 220, 36)];
            [win addSubview:ui];
        }
    });
}
