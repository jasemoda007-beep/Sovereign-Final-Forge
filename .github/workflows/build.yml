name: Falcon Shadow Dylib - Standalone 5s

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build_falcon:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create Falcon Source
        run: |
          mkdir -p jni
          cat <<'EOF' > jni/main.mm
          #import <Foundation/Foundation.h>
          #include <mach-o/dyld.h>
          #include <mach/mach.h>
          #include <objc/runtime.h>
          #include <stdint.h>

          // ==========================================
          // [ تعريفات الهوكات - الأدوات ]
          // ==========================================
          uintptr_t get_Base() { return (uintptr_t)_dyld_get_image_header(0); }

          void Patch(uintptr_t addr, uint32_t data) {
              mach_port_t task = mach_task_self();
              vm_address_t page_start = trunc_page(addr);
              // تم التصليح: استخدمنا vm_page_size لضمان التوافق مع نظام Mach
              vm_size_t page_sz = vm_page_size; 
              
              if (vm_protect(task, page_start, page_sz, FALSE, VM_PROT_READ | VM_PROT_WRITE | VM_PROT_COPY) == KERN_SUCCESS) {
                  *(uint32_t *)addr = data;
                  vm_protect(task, page_start, page_sz, FALSE, VM_PROT_READ | VM_PROT_EXECUTE);
              }
          }

          // ==========================================
          // [ الطبقة 1: تصفير المخبر السري sub_4C18 ]
          // ==========================================
          void Layer_Informant_Bypass() {
              uintptr_t target = get_Base() + 0x4C18;
              Patch(target, 0xD2800000);     // MOV X0, #0 (Return 0)
              Patch(target + 4, 0xD65F03C0); // RET
          }

          // ==========================================
          // [ الطبقة 2: تخدير غرفة العمليات sub_11B060 ]
          // ==========================================
          void Layer_Brain_Bypass() {
              uintptr_t target = get_Base() + 0x11B060;
              // تعطيل فحص الـ vTable وإرجاع قيمة نظيفة للسيرفر
              Patch(target, 0xD2800000); 
              Patch(target + 4, 0xD65F03C0);
          }

          // ==========================================
          // [ الطبقة 3: فلترة البلاغات sub_102B84 ]
          // ==========================================
          void Layer_Reporter_Bypass() {
              uintptr_t target = get_Base() + 0x102B84;
              // إخراس دالة التبليغ المركزية لمنع إرسال أي لوجات مخالفة
              Patch(target, 0xD65F03C0); // RET فوراً
          }

          // ==========================================
          // [ الطبقة 4: مكان الهوكات الجديدة (إضافة مسعود) ]
          // ==========================================
          void Layer_Custom_New_Hooks() {
              // ضلعي مسعود.. هنا المساحة مفتوحة إلك لأي أوفست جديد
              // مخصص لإضافاتك المستقبلية
          }

          // ==========================================
          // [ المحرك الرئيسي - التشغيل بعد 5 ثواني ]
          // ==========================================
          __attribute__((constructor))
          static void Falcon_Ghost_Init() {
              // تأخير 5 ثواني لضمان استقرار اللعبة وتخطي الفحص الأولي
              dispatch_after(dispatch_time(DISPATCH_TIME_NOW, (int64_t)(5 * NSEC_PER_SEC)), dispatch_get_main_queue(), ^{
                  
                  Layer_Informant_Bypass();
                  Layer_Brain_Bypass();
                  Layer_Reporter_Bypass();
                  Layer_Custom_New_Hooks();

                  printf("🛡️ [FALCON-SHADOW] All layers active after 5s delay.\n");
              });
          }
          EOF

      - name: Build Falcon Dylib
        run: |
          clang++ -dynamiclib -std=c++11 \
          -x objective-c++ \
          -isysroot $(xcrun --sdk iphoneos --show-sdk-path) \
          -arch arm64 \
          jni/main.mm -o FalconShadow.dylib \
          -framework Foundation -lobjc

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Falcon-Shadow-V1.1
          path: FalconShadow.dylib
          
