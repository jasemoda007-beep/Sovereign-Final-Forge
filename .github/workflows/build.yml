name: Sovereign-Pro-Build

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Generate and Compile Sovereign Core
        run: |
          cat << 'EOF' > main.mm
          /**
           * Project: Sovereign Elite Core v6500 (SAFE MODE)
           * Architect: General Wsam Al-Safi
           * Feature: Isolated UI Test to detect 10-second crash
           */

          #import <UIKit/UIKit.h>
          #import <mach-o/dyld.h>
          #import <Foundation/Foundation.h>
          #import <objc/runtime.h>

          #define SERVER_API @"http://jojolmlm.hopto.org/dashboard_v60.php?api=true"
          #define OFFICIAL_ID @"com.tencent.ig"

          @interface SovereignSafeHUD : UIView
          @property (nonatomic, strong) UILabel *statusLabel;
          @property (nonatomic, strong) UIView *lamp;
          @end

          @implementation SovereignSafeHUD

          // =========================================================
          // [🎭] OFFICIAL SPOOFING ONLY (Safe)
          // =========================================================
          + (void)load {
              static dispatch_once_t onceToken;
              dispatch_once(&onceToken, ^{
                  @try {
                      Method origId = class_getInstanceMethod([NSBundle class], @selector(bundleIdentifier));
                      Method swizId = class_getInstanceMethod([self class], @selector(sov_bundleIdentifier));
                      method_exchangeImplementations(origId, swizId);

                      Method origPath = class_getInstanceMethod([NSBundle class], @selector(bundlePath));
                      Method swizPath = class_getInstanceMethod([self class], @selector(sov_bundlePath));
                      method_exchangeImplementations(origPath, swizPath);
                  } @catch (NSException *e) {}
              });
          }

          - (NSString *)sov_bundleIdentifier { return OFFICIAL_ID; }
          - (NSString *)sov_bundlePath { return @"/var/containers/Bundle/Application/ShadowTrackerExtra.app"; }

          // =========================================================
          // [🔄] SAFE UI ENGINE (Bulletproof Window Injection)
          // =========================================================
          - (instancetype)initWithFrame:(CGRect)frame {
              self = [super initWithFrame:frame];
              if (self) {
                  self.backgroundColor = [[UIColor blackColor] colorWithAlphaComponent:0.85];
                  self.layer.cornerRadius = 15;
                  self.layer.borderColor = [UIColor cyanColor].CGColor;
                  self.layer.borderWidth = 1.2;

                  UILabel *title = [[UILabel alloc] initWithFrame:CGRectMake(10, 5, 180, 15)];
                  title.text = @"SOVEREIGN SAFE MODE v6500";
                  title.textColor = [UIColor cyanColor];
                  title.font = [UIFont boldSystemFontOfSize:9];
                  title.textAlignment = NSTextAlignmentCenter;
                  [self addSubview:title];

                  self.statusLabel = [[UILabel alloc] initWithFrame:CGRectMake(10, 22, 180, 20)];
                  self.statusLabel.text = @"System Stable: No Crashes ✅";
                  self.statusLabel.textColor = [UIColor greenColor];
                  self.statusLabel.font = [UIFont boldSystemFontOfSize:10];
                  self.statusLabel.textAlignment = NSTextAlignmentCenter;
                  [self addSubview:self.statusLabel];

                  [self enableMovement];
              }
              return self;
          }

          - (void)enableMovement {
              self.userInteractionEnabled = YES;
              UIPanGestureRecognizer *pan = [[UIPanGestureRecognizer alloc] initWithTarget:self action:@selector(handlePan:)];
              [self addGestureRecognizer:pan];
          }
          - (void)handlePan:(UIPanGestureRecognizer *)sender {
              CGPoint trans = [sender translationInView:self.superview];
              self.center = CGPointMake(self.center.x + trans.x, self.center.y + trans.y);
              [sender setTranslation:CGPointZero inView:self.superview];
          }
          @end

          // =========================================================
          // [🚀] SAFE CONSTRUCTOR (The 10-Second Test)
          // =========================================================
          void __attribute__((constructor)) start_safe_mode() {
              dispatch_after(dispatch_time(DISPATCH_TIME_NOW, (int64_t)(10 * NSEC_PER_SEC)), dispatch_get_main_queue(), ^{
                  
                  // [تنبيه للجنرال]: تم إيقاف دالة اغتيال أنجوس مؤقتاً لاختبار استقرار الواجهة
                  // Neutralize_ACE_Target(); 
                  
                  // حقن الواجهة بطريقة آمنة 100% لتجنب الـ Null Pointer
                  UIWindow *targetWindow = nil;
                  if (@available(iOS 13.0, *)) {
                      for (UIWindowScene* scene in [UIApplication sharedApplication].connectedScenes) {
                          if (scene.activationState == UISceneActivationStateForegroundActive) {
                              targetWindow = scene.windows.firstObject;
                              break;
                          }
                      }
                  }
                  
                  #pragma clang diagnostic push
                  #pragma clang diagnostic ignored "-Wdeprecated-declarations"
                  if (!targetWindow) {
                      targetWindow = [UIApplication sharedApplication].keyWindow;
                  }
                  #pragma clang diagnostic pop

                  if (targetWindow) {
                      CGFloat sw = [UIScreen mainScreen].bounds.size.width;
                      SovereignSafeHUD *ui = [[SovereignSafeHUD alloc] initWithFrame:CGRectMake(sw/2 - 100, 45, 200, 45)];
                      [targetWindow addSubview:ui];
                  }
              });
          }
          EOF

          export SDK_PATH=$(xcrun --sdk iphoneos --show-sdk-path)
          clang -dynamiclib -arch arm64 main.mm -o Sovereign_Safe.dylib \
          -isysroot $SDK_PATH \
          -framework Foundation -framework UIKit -framework CoreGraphics \
          -fobjc-arc -Os -w -lc++

      - name: Upload Sovereign Dylib
        uses: actions/upload-artifact@v4
        with:
          name: Sovereign-Safe-Mode
          path: Sovereign_Safe.dylib
