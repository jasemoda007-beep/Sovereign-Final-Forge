name: Standalone Security Bypass - Delay 5s

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build_standalone:
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Create Source Code
        run: |
          mkdir -p jni
          cat <<'EOF' > jni/main.mm
          #import <Foundation/Foundation.h>
          #include <mach-o/dyld.h>
          #include <mach/mach.h>
          #include <stdint.h>

          // --- [ وظيفة كتابة الذاكرة الآمنة ] ---
          void PatchMemory(uintptr_t address, uint32_t instruction) {
              mach_port_t task = mach_task_self();
              vm_address_t page_start = trunc_page(address);
              vm_size_t page_size = page_size; 

              kern_return_t kr = vm_protect(task, page_start, page_size, FALSE, VM_PROT_READ | VM_PROT_WRITE | VM_PROT_COPY);
              if (kr == KERN_SUCCESS) {
                  *(uint32_t *)address = instruction;
                  vm_protect(task, page_start, page_size, FALSE, VM_PROT_READ | VM_PROT_EXECUTE);
              }
          }

          // --- [ المهمة الأساسية: تخدير sub_4C18 ] ---
          void DisableSecurityCollector() {
              uintptr_t baseAddr = (uintptr_t)_dyld_get_image_header(0);
              uintptr_t targetFunc = baseAddr + 0x4C18; 

              // MOV X0, #0 -> 0xD2800000 
              // RET       -> 0xD65F03C0 

              PatchMemory(targetFunc, 0xD2800000);     
              PatchMemory(targetFunc + 4, 0xD65F03C0); 
              
              printf("🚀 [GHOST] sub_4C18 Neutered after 5s delay.\n");
          }

          // --- [ نقطة الانطلاق مع تأخير 5 ثواني ] ---
          __attribute__((constructor))
          static void entry() {
              // خليه 5 ثواني يتاخر مثل ما طلبت يا بطل
              dispatch_after(dispatch_time(DISPATCH_TIME_NOW, (int64_t)(5 * NSEC_PER_SEC)), dispatch_get_main_queue(), ^{
                  DisableSecurityCollector();
              });
          }
          EOF

      - name: Compile Standalone Dylib
        run: |
          clang++ -dynamiclib -std=c++11 \
          -x objective-c++ \
          -isysroot $(xcrun --sdk iphoneos --show-sdk-path) \
          -arch arm64 \
          jni/main.mm -o SecurityBypass.dylib \
          -framework Foundation -lobjc

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Standalone-Bypass-5s
          path: SecurityBypass.dylib
          
