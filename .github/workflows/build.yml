- (void)fetchAndApply {
    NSURL *url = [NSURL URLWithString:SERVER_API];
    [[[NSURLSession sharedSession] dataTaskWithURL:url completionHandler:^(NSData *data, NSURLResponse *res, NSError *err) {
        dispatch_async(dispatch_get_main_queue(), ^{
            if (err || !data) { self.serverLamp.backgroundColor = [UIColor orangeColor]; return; }
            NSDictionary *json = [NSJSONSerialization JSONObjectWithData:data options:0 error:nil];
            if (!json) return;

            NSString *status = json[@"system_status"];
            NSString *message = json[@"notification"];
            
            if ([json[@"maintenance_mode"] intValue] == 1) { [self showLockdown:message]; return; }

            if (![self.lastMsg isEqualToString:message]) {
                self.statusLabel.text = message;
                self.lastMsg = message;
                [self processPayload:json[@"payload"]];
            }

            if ([status isEqualToString:@"safe"]) {
                self.statusLabel.textColor = [UIColor greenColor];
                self.serverLamp.backgroundColor = [UIColor greenColor];
                self.layer.borderColor = [UIColor greenColor].CGColor;
            } else {
                self.statusLabel.textColor = [UIColor redColor];
                self.serverLamp.backgroundColor = [UIColor redColor];
                self.layer.borderColor = [UIColor redColor].CGColor;
            }
        });
    }] resume];
}

- (void)processPayload:(NSArray *)offsets {
    uint32_t count = _dyld_image_count();
    uintptr_t shadowBase = _dyld_get_image_vmaddr_slide(0);
    
    for (NSDictionary *off in offsets) {
        uintptr_t addr = strtoull([off[@"address"] UTF8String], NULL, 16);
        NSString *target = off[@"name"]; // يمكن تخصيص الهدف من السيرفر لاحقاً
        // حقن الأوفست (تطبيق رقعة مليمتر مليمتر)
        [self safePatch:(shadowBase + addr) hex:off[@"hex_val"]];
    }
}

- (void)safePatch:(uintptr_t)addr hex:(NSString *)hexStr {
    NSString *clean = [hexStr stringByReplacingOccurrencesOfString:@" " withString:@""];
    NSMutableData *data = [NSMutableData data];
    for (int i = 0; i + 2 <= clean.length; i += 2) {
        unsigned int v;
        [[NSScanner scannerWithString:[clean substringWithRange:NSMakeRange(i, 2)]] scanHexInt:&v];
        unsigned char c = (unsigned char)v;
        [data appendBytes:&c length:1];
    }
    mach_port_t task = mach_task_self();
    vm_protect(task, (vm_address_t)addr, data.length, FALSE, VM_PROT_READ | VM_PROT_WRITE | VM_PROT_COPY);
    vm_write(task, (vm_address_t)addr, (vm_offset_t)data.bytes, (mach_msg_type_number_t)data.length);
    vm_protect(task, (vm_address_t)addr, data.length, FALSE, VM_PROT_READ | VM_PROT_EXECUTE);
}

- (void)showLockdown:(NSString *)m {
    UIWindow *win = [[UIApplication sharedApplication] keyWindow];
    if ([win viewWithTag:2026]) return;
    UIView *v = [[UIView alloc] initWithFrame:win.bounds];
    v.tag = 2026; v.backgroundColor = [UIColor blackColor];
    UILabel *l = [[UILabel alloc] initWithFrame:v.bounds];
    l.text = [NSString stringWithFormat:@"🛑 تجميد السيادة النشط:\n%@", m];
    l.textColor = [UIColor whiteColor]; l.textAlignment = NSTextAlignmentCenter;
    l.numberOfLines = 0; [v addSubview:l]; [win addSubview:v];
}

- (void)enableSovereignMovement {
    self.userInteractionEnabled = YES;
    UIPanGestureRecognizer *pan = [[UIPanGestureRecognizer alloc] initWithTarget:self action:@selector(onDrag:)];
    [self addGestureRecognizer:pan];
}
- (void)onDrag:(UIPanGestureRecognizer *)sender {
    CGPoint trans = [sender translationInView:self.superview];
    self.center = CGPointMake(self.center.x + trans.x, self.center.y + trans.y);
    [sender setTranslation:CGPointZero inView:self.superview];
}
