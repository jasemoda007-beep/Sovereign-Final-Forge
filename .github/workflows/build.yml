name: Build Masoud Encrypted Bypass

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python (The Melter)
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Create Project & Melt Strings
        run: |
          mkdir -p MasoudProject
          cd MasoudProject
          
          # تحميل fishhook
          curl -sO https://raw.githubusercontent.com/facebook/fishhook/main/fishhook.h
          curl -sO https://raw.githubusercontent.com/facebook/fishhook/main/fishhook.c

          # سكريبت بايثون لـ "صهر" النصوص الحساسة
          python3 - << 'EOF'
          def melt_string(plain, key=0x55):
              return ", ".join([hex(ord(c) ^ key) for c in plain]) + ", 0x0"

          targets = {
              "STR_CYDIA": "Cydia",
              "STR_SUBSTRATE": "MobileSubstrate",
              "STR_BYPASS": "ShadowBypass",
              "STR_DLSYM": "dlsym",
              "STR_PTRACE": "ptrace"
          }

          with open("MeltedStrings.h", "w") as f:
              f.write("#ifndef MELTED_H\n#define MELTED_H\n")
              for name, val in targets.items():
                  f.write(f"static const unsigned char {name}[] = {{ {melt_string(val)} }};\n")
              f.write("#endif")
          EOF

          # كتابة كود التويك (Tweak.mm) مع كود فك الصهر
          cat << 'EOF' > Tweak.mm
          #import <Foundation/Foundation.h>
          #import <mach-o/dyld.h>
          #import <sys/mman.h>
          #import <dlfcn.h>
          #import "fishhook.h"
          #import "MeltedStrings.h"

          // دالة فك الصهر في الذاكرة الحية
          // المعادلة: $P = C \oplus K$
          char* unmelt(const unsigned char* input) {
              size_t len = 0;
              while(input[len] != 0x0) len++;
              char* out = (char*)malloc(len + 1);
              for(size_t i=0; i<len; i++) out[i] = input[i] ^ 0x55;
              out[len] = '\0';
              return out;
          }

          void apply_patch(uint64_t offset) {
              intptr_t slide = _dyld_get_image_vmaddr_slide(0);
              uintptr_t addr = slide + 0x100000000 + offset;
              size_t psize = sysconf(_SC_PAGESIZE);
              uintptr_t start = addr & ~(psize - 1);
              mprotect((void*)start, psize, PROT_READ | PROT_WRITE | PROT_EXEC);
              unsigned char nop[] = {0x1F, 0x20, 0x03, 0xD5};
              memcpy((void*)addr, nop, 4);
          }

          static void* (*orig_dlsym)(void* handle, const char* symbol);
          
          void* hooked_dlsym(void* handle, const char* symbol) {
              if (symbol) {
                  char* sym_bypass = unmelt(STR_BYPASS);
                  if (strstr(symbol, sym_bypass)) {
                      free(sym_bypass);
                      return NULL;
                  }
                  free(sym_bypass);
              }
              return orig_dlsym(handle, symbol);
          }

          __attribute__((constructor)) static void init() {
              dispatch_after(dispatch_time(DISPATCH_TIME_NOW, 20 * NSEC_PER_SEC), dispatch_get_main_queue(), ^{
                  apply_patch(0x68F2720);
                  
                  char* dlsym_name = unmelt(STR_DLSYM);
                  struct rebinding rebs[] = {
                      {dlsym_name, (void *)hooked_dlsym, (void **)&orig_dlsym}
                  };
                  rebind_symbols(rebs, 1);
                  free(dlsym_name);
              });
          }
          EOF

      - name: Build with Xcode Toolchain
        run: |
          cd MasoudProject
          # استخدام clang مباشرة (محرك Xcode) مع أعلى مستويات التجريد والحماية
          xcrun -sdk iphoneos clang -dynamiclib -arch arm64 \
            -miphoneos-version-min=12.0 \
            -O3 -flto -fobjc-arc \
            -Wl,-dead_strip -Wl,-x \
            Tweak.mm fishhook.c -o MasoudBypass.dylib \
            -framework Foundation -I.

      - name: Upload Melted Dylib
        uses: actions/upload-artifact@v4
        with:
          name: Masoud-Melted-Bypass
          path: MasoudProject/*.dylib
          
