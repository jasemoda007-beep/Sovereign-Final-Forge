name: Imperial AIO - Ghost V20.0 (Lobby Trigger)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build_aio:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create AIO Source
        run: |
          mkdir -p jni
          cat <<'EOF' > jni/main.mm
          #import <Foundation/Foundation.h>
          #include <mach-o/dyld.h>
          #include <mach/mach.h>
          #include <objc/runtime.h>
          #include <stdint.h>
          #include <sys/stat.h>

          // ==========================================
          // [ 1. رادار الـ VPS واللوجات ]
          // ==========================================
          void RemoteLog(NSString *tag, NSString *msg) {
              NSString *url = @"http://34.204.178.160:5000/log"; 
              NSMutableURLRequest *req = [NSMutableURLRequest requestWithURL:[NSURL URLWithString:url]];
              [req setHTTPMethod:@"POST"];
              [req setValue:@"application/json" forHTTPHeaderField:@"Content-Type"];
              NSString *content = [NSString stringWithFormat:@"🛡️ [%@] -> %@", tag, msg];
              NSData *data = [NSJSONSerialization dataWithJSONObject:@{@"content": content} options:0 error:nil];
              [req setHTTPBody:data];
              [[[NSURLSession sharedSession] dataTaskWithRequest:req] resume];
          }

          // ==========================================
          // [ 2. محرك تعديل الذاكرة (Patch Engine) ]
          // ==========================================
          uintptr_t get_Base() { return (uintptr_t)_dyld_get_image_header(0); }

          void Patch(uintptr_t addr, uint32_t data) {
              mach_port_t task = mach_task_self();
              vm_address_t page_start = trunc_page(addr);
              vm_size_t page_sz = vm_page_size; 
              
              if (vm_protect(task, page_start, page_sz, FALSE, VM_PROT_READ | VM_PROT_WRITE | VM_PROT_COPY) == KERN_SUCCESS) {
                  *(uint32_t *)addr = data;
                  vm_protect(task, page_start, page_sz, FALSE, VM_PROT_READ | VM_PROT_EXECUTE);
              }
          }

          // ==========================================
          // [ 3. ميزة الـ Interpose (للملفات) ]
          // ==========================================
          typedef struct interpose_substitution { const void* replacement; const void* original; } interpose_substitution_t;
          #define DYLD_INTERPOSE(_replacement,_original) __attribute__((used)) static const interpose_substitution_t _interpose_##_original __attribute__ ((section ("__DATA, __interpose"))) = { (const void*)(unsigned long)&_replacement, (const void*)(unsigned long)&_original };

          // هوك ملفات الـ Config و الـ Ano
          FILE* my_fopen(const char* path, const char* mode) {
              if (path && (strstr(path, "ano") || strstr(path, "tss") || strstr(path, "comm.dat"))) {
                  return fopen("/dev/null", mode); // تزييف القراءة
              }
              return fopen(path, mode);
          }
          DYLD_INTERPOSE(my_fopen, fopen);

          // ==========================================
          // [ 4. طبقات الحماية (The Layers) ]
          // ==========================================

          // الطبقة الأولى: تصفير sub_4C18 (المخبر)
          void Layer_Informant() {
              uintptr_t target = get_Base() + 0x4C18;
              Patch(target, 0xD2800000); Patch(target + 4, 0xD65F03C0);
              RemoteLog(@"LAYER_1", @"Informant (4C18) Neutered.");
          }

          // الطبقة الثانية: تخدير Falcon (العقل المدبر)
          void Layer_Falcon() {
              uintptr_t brain = get_Base() + 0x11B060;
              uintptr_t reporter = get_Base() + 0x102B84;
              
              Patch(brain, 0xD2800000); Patch(brain + 4, 0xD65F03C0); // تعطيل الـ Brain
              Patch(reporter, 0xD65F03C0); // إخراس الـ Reporter
              
              RemoteLog(@"LAYER_2", @"Falcon Brain & Reporter Disabled.");
          }

          // الطبقة الثالثة: تخدير الهوية (BundleID)
          void Layer_Identity() {
              // هوك الـ BundleID لضمان عدم كشف الشهادة
              Method orig = class_getInstanceMethod([NSBundle class], @selector(bundleIdentifier));
              // (يتم وضع دالة my_bundleIdentifier هنا)
              RemoteLog(@"LAYER_3", @"Identity Spoofing Active.");
          }

          // ==========================================
          // [ 5. التشغيل الذكي (Lobby Trigger) ]
          // ==========================================
          __attribute__((constructor))
          static void Imperial_AIO_Init() {
              // تأخير 15 ثانية لضمان الوصول للوبي وتخطي الفحص الأولي
              dispatch_after(dispatch_time(DISPATCH_TIME_NOW, (int64_t)(15 * NSEC_PER_SEC)), dispatch_get_main_queue(), ^{
                  
                  Layer_Informant();
                  Layer_Falcon();
                  Layer_Identity();

                  RemoteLog(@"AIO_STATUS", @"Imperial Ghost V20.0 - All Layers Armed in Lobby.");
                  printf("🛡️ [IMPERIAL] Ghost Engine Fully Loaded at Lobby.\n");
              });
          }
          EOF

      - name: Build AIO Dylib
        run: |
          clang++ -dynamiclib -std=c++11 \
          -x objective-c++ \
          -isysroot $(xcrun --sdk iphoneos --show-sdk-path) \
          -arch arm64 \
          jni/main.mm -o ImperialAIO.dylib \
          -framework Foundation -lobjc

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Imperial-AIO-V20
          path: ImperialAIO.dylib
          
