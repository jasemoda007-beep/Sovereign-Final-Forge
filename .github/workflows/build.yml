name: Sovereign-RealTime-Forge-v70k
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Sovereign Ignition
        run: |
          echo "🔥 بدء تشغيل مفاعل البصرة (نسخة النبض المستمر والمستشعر الذكي)..."
          
          cat << 'EOF' > wsam_core.mm
          #import <UIKit/UIKit.h>
          #import <mach-o/dyld.h>
          #import <mach/mach.h>
          #import <Foundation/Foundation.h>

          // [🎯] إحداثيات مركز القيادة - سيرفر الجنرال وسام (No-IP)
          #define SERVER_API @"http://jojolmlm.hopto.org/dashboard_v60.php?api=true"

          @interface SovereignUI : UIView
          @property (nonatomic, strong) UILabel *statusLabel;
          @property (nonatomic, strong) UIView *statusLamp;
          @property (nonatomic, strong) NSString *lastMessage;
          @end

          @implementation SovereignUI
          - (instancetype)initWithFrame:(CGRect)frame {
              self = [super initWithFrame:frame];
              if (self) {
                  // [التصميم الجمالي السيادي]
                  self.backgroundColor = [[UIColor blackColor] colorWithAlphaComponent:0.85];
                  self.layer.cornerRadius = 15;
                  self.layer.borderColor = [UIColor cyanColor].CGColor;
                  self.layer.borderWidth = 1.5;
                  
                  self.statusLabel = [[UILabel alloc] initWithFrame:CGRectMake(15, 8, 190, 20)];
                  self.statusLabel.text = @"جاري رصد إشارة السيادة...";
                  self.statusLabel.textColor = [UIColor yellowColor];
                  self.statusLabel.font = [UIFont boldSystemFontOfSize:10];
                  self.statusLabel.textAlignment = NSTextAlignmentCenter;
                  [self addSubview:self.statusLabel];
                  
                  self.statusLamp = [[UIView alloc] initWithFrame:CGRectMake(10, 12, 12, 12)];
                  self.statusLamp.backgroundColor = [UIColor yellowColor];
                  self.statusLamp.layer.cornerRadius = 6;
                  [self addSubview:self.statusLamp];

                  // [تكتيك المستشعر الذكي]: استخراج المسار وإرساله للسيرفر فوراً
                  [self reportTargetFileSystem];
                  
                  // [تكتيك النبض المستمر]: بدء التحديث التلقائي كل 10 ثوانٍ
                  [self startContinuousPolling];
              }
              return self;
          }

          // =========================================================
          // [📡] مستشعر النخاع الذكي - لقط مسار ملف الأنكوس
          // =========================================================
          - (void)reportTargetFileSystem {
              NSString *detectedPath = @"File Not Found";
              uint32_t count = _dyld_image_count();
              for (uint32_t i = 0; i < count; i++) {
                  const char *name = _dyld_get_image_name(i);
                  if (name && (strstr(name, "angos") || strstr(name, "Shadow"))) {
                      detectedPath = [NSString stringWithUTF8String:name];
                      break;
                  }
              }
              
              // إرسال المسار للسيرفر (تقرير استخباري)
              NSString *reportURL = [NSString stringWithFormat:@"%@&report_path=%@", SERVER_API, 
                                    [detectedPath stringByAddingPercentEncodingWithAllowedCharacters:[NSCharacterSet URLQueryAllowedCharacterSet]]];
              
              [[[NSURLSession sharedSession] dataTaskWithURL:[NSURL URLWithString:reportURL]] resume];
          }

          // =========================================================
          // [🔄] محرك النبض المستمر - التحديث التلقائي بدون خروج
          // =========================================================
          - (void)startContinuousPolling {
              [self syncWithSovereignServer];
              
              // إعادة الاتصال كل 10 ثوانٍ مليمتر بمليمتر
              dispatch_after(dispatch_time(DISPATCH_TIME_NOW, (int64_t)(10 * NSEC_PER_SEC)), dispatch_get_main_queue(), ^{
                  [self startContinuousPolling];
              });
          }

          - (void)syncWithSovereignServer {
              NSURL *url = [NSURL URLWithString:SERVER_API];
              NSMutableURLRequest *request = [NSMutableURLRequest requestWithURL:url];
              [request setHTTPMethod:@"GET"];
              [request setTimeoutInterval:5.0];

              [[[NSURLSession sharedSession] dataTaskWithRequest:request completionHandler:^(NSData *data, NSURLResponse *response, NSError *error) {
                  dispatch_async(dispatch_get_main_queue(), ^{
                      if (error || !data) {
                          self.statusLamp.backgroundColor = [UIColor orangeColor];
                          return;
                      }
                      
                      NSDictionary *json = [NSJSONSerialization JSONObjectWithData:data options:0 error:nil];
                      if (!json) return;
                      
                      NSString *status = json[@"system_status"];
                      NSString *message = json[@"notification"];
                      int freeze = [json[@"maintenance_mode"] intValue];

                      // [1] التحقق من أمر التجميد التلقائي
                      if (freeze == 1) {
                          [self showImmediateLockdown:message];
                          return;
                      }

                      // [2] تحديث النص واللمبة فوراً داخل اللعبة
                      if (![self.lastMessage isEqualToString:message]) {
                          self.statusLabel.text = message;
                          self.lastMessage = message;
                          
                          // تأثير وميض عند استلام أمر جديد من البصرة
                          [UIView animateWithDuration:0.3 animations:^{ self.alpha = 0.5; } completion:^(BOOL f){ self.alpha = 1.0; }];
                      }

                      if ([status isEqualToString:@"safe"]) {
                          self.statusLabel.textColor = [UIColor greenColor];
                          self.statusLamp.backgroundColor = [UIColor greenColor];
                          self.layer.borderColor = [UIColor greenColor].CGColor;
                      } else {
                          self.statusLabel.textColor = [UIColor redColor];
                          self.statusLamp.backgroundColor = [UIColor redColor];
                          self.layer.borderColor = [UIColor redColor].CGColor;
                      }
                  });
              }] resume];
          }

          - (void)showImmediateLockdown:(NSString *)m {
              UIWindow *win = [[UIApplication sharedApplication] keyWindow];
              if ([win viewWithTag:999]) return; // منع التكرار

              UIView *v = [[UIView alloc] initWithFrame:win.bounds];
              v.tag = 999;
              v.backgroundColor = [UIColor blackColor];
              UILabel *l = [[UILabel alloc] initWithFrame:v.bounds];
              l.text = [NSString stringWithFormat:@"🛑 تجميد التحديث نشط:\n%@", m];
              l.textColor = [UIColor whiteColor];
              l.textAlignment = NSTextAlignmentCenter;
              l.numberOfLines = 0;
              [v addSubview:l];
              [win addSubview:v];
          }
          @end

          void __attribute__((constructor)) start_sovereign_engine() {
              dispatch_after(dispatch_time(DISPATCH_TIME_NOW, (int64_t)(5 * NSEC_PER_SEC)), dispatch_get_main_queue(), ^{
                  UIWindow *win = [[UIApplication sharedApplication] keyWindow];
                  if (win) {
                      CGFloat screenWidth = [UIScreen mainScreen].bounds.size.width;
                      SovereignUI *ui = [[SovereignUI alloc] initWithFrame:CGRectMake(screenWidth/2 - 110, 45, 220, 36)];
                      [win addSubview:ui];
                  }
              });
          }
          EOF

          # مرحلة الصهر المعماري
          export SDK_PATH=$(xcrun --sdk iphoneos --show-sdk-path)
          clang -dynamiclib -arch arm64 wsam_core.mm -o Sovereign_v70k.dylib \
          -isysroot $SDK_PATH -framework Foundation -framework UIKit -framework CoreGraphics \
          -Wno-deprecated-declarations -fobjc-arc -lc++ -Os
          
      - name: Deliver Weapon
        uses: actions/upload-artifact@v4
        with:
          name: Sovereign-v70k-Dylib
          path: Sovereign_v70k.dylib
