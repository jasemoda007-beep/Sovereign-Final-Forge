name: Sovereign-Fixed-Forge
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Sovereign Ignition
        run: |
          echo "🔥 بدء تشغيل مفاعل البصرة (نسخة الثبات المطلق)..."
          
          cat << 'EOF' > wsam_core.mm
          #import <UIKit/UIKit.h>
          #import <mach-o/dyld.h>
          #import <mach/mach.h>
          #import <Foundation/Foundation.h>

          // [🎯] إحداثيات مركز القيادة - الرابط المشفر (HTTPS) لضمان اختراق جدار آبل
          #define SERVER_API @"https://files.free.nf/wsam_core/dashboard_v50.php?api=true"

          @interface SovereignUI : UIView
          @property (nonatomic, strong) UILabel *statusLabel;
          @property (nonatomic, strong) UIView *statusLamp;
          @end

          @implementation SovereignUI
          - (instancetype)initWithFrame:(CGRect)frame {
              self = [super initWithFrame:frame];
              if (self) {
                  // تصميم فخم (خلفية سوداء شفافة مع حدود سيان)
                  self.backgroundColor = [[UIColor blackColor] colorWithAlphaComponent:0.8];
                  self.layer.cornerRadius = 8;
                  self.layer.borderColor = [UIColor cyanColor].CGColor;
                  self.layer.borderWidth = 1.0;
                  
                  self.statusLabel = [[UILabel alloc] initWithFrame:CGRectMake(5, 2, 160, 20)];
                  self.statusLabel.text = @"جاري فحص السيادة...";
                  self.statusLabel.textColor = [UIColor yellowColor];
                  self.statusLabel.font = [UIFont boldSystemFontOfSize:10];
                  self.statusLabel.textAlignment = NSTextAlignmentCenter;
                  [self addSubview:self.statusLabel];
                  
                  self.statusLamp = [[UIView alloc] initWithFrame:CGRectMake(5, 7, 10, 10)];
                  self.statusLamp.backgroundColor = [UIColor yellowColor];
                  self.statusLamp.layer.cornerRadius = 5;
                  [self addSubview:self.statusLamp];
                  
                  // تم حذف أكواد التحريك (Gesture Recognizers) لضمان الثبات المطلق
                  
                  [self startSecureLink];
              }
              return self;
          }

          - (void)startSecureLink {
              // إعداد طلب الاتصال المشفر
              NSMutableURLRequest *request = [NSMutableURLRequest requestWithURL:[NSURL URLWithString:SERVER_API]];
              [request setHTTPMethod:@"GET"];
              [request setTimeoutInterval:15.0];

              [[[NSURLSession sharedSession] dataTaskWithRequest:request completionHandler:^(NSData *data, NSURLResponse *response, NSError *error) {
                  dispatch_async(dispatch_get_main_queue(), ^{
                      if (error || !data) {
                          self.statusLabel.text = @"فشل الالتحام بالسيرفر!";
                          self.statusLamp.backgroundColor = [UIColor redColor];
                          return;
                      }
                      
                      NSDictionary *json = [NSJSONSerialization JSONObjectWithData:data options:0 error:nil];
                      if (!json) {
                          self.statusLabel.text = @"خطأ في تشفير البيانات!";
                          return;
                      }
                      
                      NSString *status = json[@"status"];
                      NSString *message = json[@"message"];
                      
                      if ([status isEqualToString:@"maintenance"]) {
                          [self showGlobalLockdown:message];
                      } else if ([status isEqualToString:@"safe"]) {
                          self.statusLabel.text = @"الحماية مفعلة - وسام الصافي ✅";
                          self.statusLabel.textColor = [UIColor greenColor];
                          self.statusLamp.backgroundColor = [UIColor greenColor];
                      } else if ([status isEqualToString:@"detected"]) {
                          self.statusLabel.text = @"🛑 مكشوف! اخرج فوراً";
                          self.statusLabel.textColor = [UIColor redColor];
                          self.statusLamp.backgroundColor = [UIColor redColor];
                      }
                  });
              }] resume];
          }

          - (void)showGlobalLockdown:(NSString *)msg {
              self.hidden = YES;
              UIView *v = [[UIView alloc] initWithFrame:[UIScreen mainScreen].bounds];
              v.backgroundColor = [UIColor blackColor];
              UILabel *l = [[UILabel alloc] initWithFrame:v.bounds];
              l.text = [NSString stringWithFormat:@"🛑 صيانة عاجلة:\n%@", msg];
              l.textColor = [UIColor whiteColor];
              l.textAlignment = NSTextAlignmentCenter;
              l.numberOfLines = 0;
              [v addSubview:l];
              
              // الوصول الآمن للنافذة
              UIWindow *win = nil;
              for (UIWindowScene* scene in [UIApplication sharedApplication].connectedScenes) {
                  if (scene.activationState == UISceneActivationStateForegroundActive) {
                      win = scene.windows.firstObject; break;
                  }
              }
              if (!win) win = [UIApplication sharedApplication].keyWindow;
              [win addSubview:v];
          }
          @end

          void __attribute__((constructor)) start_engine() {
              dispatch_after(dispatch_time(DISPATCH_TIME_NOW, 6 * NSEC_PER_SEC), dispatch_get_main_queue(), ^{
                  UIWindow *win = nil;
                  for (UIWindowScene* scene in [UIApplication sharedApplication].connectedScenes) {
                      if (scene.activationState == UISceneActivationStateForegroundActive) {
                          win = scene.windows.firstObject; break;
                      }
                  }
                  if (!win) win = [UIApplication sharedApplication].keyWindow;
                  
                  if (win) {
                      // [🎯] تثبيت الموقع في أعلى منتصف الشاشة (إحداثيات ثابتة)
                      CGFloat screenWidth = [UIScreen mainScreen].bounds.size.width;
                      SovereignUI *ui = [[SovereignUI alloc] initWithFrame:CGRectMake(screenWidth/2 - 90, 35, 180, 25)];
                      [win addSubview:ui];
                  }
              });
          }
          EOF
          
          # [3] عملية الصهر المحدثة
          export SDK_PATH=$(xcrun --sdk iphoneos --show-sdk-path)
          clang -dynamiclib -arch arm64 wsam_core.mm -o Wsam_Final.dylib \
          -isysroot $SDK_PATH \
          -framework Foundation -framework UIKit -framework CoreGraphics \
          -fobjc-arc -lc++ -Os
          
          echo "✅ تمت عملية الصهر بنجاح يا سيادة الجنرال!"

      - name: Deliver Weapon
        uses: actions/upload-artifact@v4
        with:
          name: Sovereign-Fixed-Dylib
          path: Wsam_Final.dylib
