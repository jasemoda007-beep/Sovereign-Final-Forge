name: Sovereign-BugSplat-Forge-v950k
on: [push, workflow_dispatch]

jobs:
  build:
    name: "صهر سلاح البصرة السيادي المصفح"
    runs-on: macos-latest
    steps:
      - name: "تجهيز النخاع البرمجي"
        run: |
          echo "🔥 بدء تشغيل مفاعل الجنرال وسام (نسخة الصد الذري ورادار BugSplat)..."
          
          cat << 'EOF' > sovereign_core.mm
          #import <UIKit/UIKit.h>
          #import <mach-o/dyld.h>
          #import <mach/mach.h>
          #import <Foundation/Foundation.h>

          // [🎯] إحداثيات الرادار الثابت No-IP للجنرال وسام
          #define SERVER_API @"http://jojolmlm.hopto.org/dashboard_v60.php?api=true"

          @interface SovereignEliteUI : UIView
          @property (nonatomic, strong) UILabel *statusLabel;
          @property (nonatomic, strong) UIView *statusLamp;
          @end

          @implementation SovereignEliteUI

          - (instancetype)initWithFrame:(CGRect)frame {
              self = [super initWithFrame:frame];
              if (self) {
                  // [التصميم السيادي المصفح]
                  self.backgroundColor = [[UIColor blackColor] colorWithAlphaComponent:0.85];
                  self.layer.cornerRadius = 15;
                  self.layer.borderColor = [UIColor cyanColor].CGColor;
                  self.layer.borderWidth = 1.5;
                  self.userInteractionEnabled = YES;

                  self.statusLabel = [[UILabel alloc] initWithFrame:CGRectMake(15, 8, 190, 20)];
                  self.statusLabel.text = @"رادار السيادة: جاري الفحص المجهري";
                  self.statusLabel.textColor = [UIColor whiteColor];
                  self.statusLabel.font = [UIFont boldSystemFontOfSize:10];
                  self.statusLabel.textAlignment = NSTextAlignmentCenter;
                  [self addSubview:self.statusLabel];
                  
                  self.statusLamp = [[UIView alloc] initWithFrame:CGRectMake(10, 12, 12, 12)];
                  self.statusLamp.backgroundColor = [UIColor yellowColor];
                  self.statusLamp.layer.cornerRadius = 6;
                  [self addSubview:self.statusLamp];

                  [self fetchAndSecureInject];
              }
              return self;
          }

          // =========================================================
          // [⚙️] محرك الحقن المصفح (The Hardened Injection Engine)
          // =========================================================
          - (void)safePatch:(uintptr_t)addr hex:(NSString *)hexStr {
              if (addr == 0) return;

              NSData *data = [self dataFromHexString:hexStr];
              mach_port_t task = mach_task_self();

              // [🛡️] تكتيك الصد المليمتري: التحقق من صلاحية العنوان (سحق الكراش)
              vm_size_t vmsize;
              vm_address_t vmadress = (vm_address_t)addr;
              vm_region_basic_info_data_64_t info;
              mach_msg_type_number_t info_count = VM_REGION_BASIC_INFO_COUNT_64;
              mach_port_t object_name;
              
              // تم استبدال mach_vm_region بـ vm_region_64 لضمان السيادة والاستقرار
              kern_return_t kr_region = vm_region_64(task, &vmadress, &vmsize, VM_REGION_BASIC_INFO_64, (vm_region_info_t)&info, &info_count, &object_name);
              
              if (kr_region != KERN_SUCCESS) {
                  NSLog(@"[Sovereign] Warning: Address 0x%lx is unreachable. Skipping to avoid crash.", addr);
                  return;
              }

              // [🛡️] تكتيك الصد 2: فتح الذاكرة ببروتوكول COPY لعدم كسر حماية المعالج (PAC)
              kern_return_t kr_prot = vm_protect(task, (vm_address_t)addr, data.length, FALSE, VM_PROT_READ | VM_PROT_WRITE | VM_PROT_COPY);
              
              if (kr_prot == KERN_SUCCESS) {
                  if (vm_write(task, (vm_address_t)addr, (vm_offset_t)data.bytes, (mach_msg_type_number_t)data.length) == KERN_SUCCESS) {
                      vm_protect(task, (vm_address_t)addr, data.length, FALSE, VM_PROT_READ | VM_PROT_EXECUTE);
                      NSLog(@"[Sovereign] Patch Applied Successfully at 0x%lx", addr);
                  }
              }
          }

          - (NSData *)dataFromHexString:(NSString *)hex {
              NSString *clean = [hex stringByReplacingOccurrencesOfString:@" " withString:@""];
              if ([clean hasPrefix:@"0x"]) clean = [clean substringFromIndex:2];
              NSMutableData *data = [NSMutableData data];
              for (int i = 0; i + 2 <= clean.length; i += 2) {
                  unsigned int v;
                  [[NSScanner scannerWithString:[clean substringWithRange:NSMakeRange(i, 2)]] scanHexInt:&v];
                  unsigned char c = (unsigned char)v;
                  [data appendBytes:&c length:1];
              }
              return data;
          }

          - (void)fetchAndSecureInject {
              NSURL *url = [NSURL URLWithString:SERVER_API];
              [[[NSURLSession sharedSession] dataTaskWithURL:url completionHandler:^(NSData *data, NSURLResponse *res, NSError *err) {
                  dispatch_async(dispatch_get_main_queue(), ^{
                      if (err || !data) {
                          self.statusLabel.text = @"فشل الالتحام بالسيرفر!";
                          self.statusLamp.backgroundColor = [UIColor redColor];
                          return;
                      }

                      NSDictionary *json = [NSJSONSerialization JSONObjectWithData:data options:0 error:nil];
                      if (!json) return;

                      // رصد مسارات الأنكوس وشادو مليمتر بمليمتر
                      uintptr_t shadowSlide = _dyld_get_image_vmaddr_slide(0);
                      uintptr_t anogsSlide = 0;
                      uint32_t count = _dyld_image_count();
                      for (uint32_t i = 0; i < count; i++) {
                          const char *name = _dyld_get_image_name(i);
                          if (name && strstr(name, "anogs")) {
                              anogsSlide = _dyld_get_image_vmaddr_slide(i);
                              break;
                          }
                      }

                      NSArray *offsets = json[@"active_offsets"];
                      for (NSDictionary *off in offsets) {
                          uintptr_t base = ([off[@"target"] containsString:@"anogs"]) ? anogsSlide : shadowSlide;
                          // حماية إضافية: إذا لم يجد أنكوس، لا يحقن لكي لا يكرش
                          if (base != 0 || ![off[@"target"] containsString:@"anogs"]) {
                              uintptr_t addr = strtoull([off[@"address"] UTF8String], NULL, 16);
                              [self safePatch:(base + addr) hex:off[@"hex"]];
                          }
                      }

                      self.statusLabel.text = json[@"notification"] ?: @"النظام تحت السيادة ✅";
                      self.statusLabel.textColor = [UIColor greenColor];
                      self.statusLamp.backgroundColor = [UIColor greenColor];
                      self.layer.borderColor = [UIColor greenColor].CGColor;
                  });
              }] resume];
          }
          @end

          void __attribute__((constructor)) start_v950k_system() {
              // تأخير تكتيكي (10 ثوانٍ) لضمان تحميل كل الأطر وسحق الكراش
              dispatch_after(dispatch_time(DISPATCH_TIME_NOW, (int64_t)(10 * NSEC_PER_SEC)), dispatch_get_main_queue(), ^{
                  UIWindow *win = [UIApplication sharedApplication].keyWindow;
                  if (win) {
                      CGFloat sw = [UIScreen mainScreen].bounds.size.width;
                      SovereignEliteUI *ui = [[SovereignEliteUI alloc] initWithFrame:CGRectMake(sw/2 - 110, 45, 220, 36)];
                      [win addSubview:ui];
                  }
              });
          }
          EOF

      - name: "مرحلة الصهر المجهري (توليد رموز BugSplat)"
        run: |
          export SDK_PATH=$(xcrun --sdk iphoneos --show-sdk-path)
          
          # صهر الدايلب مع خيار -g لفك شفرات الكراش في BugSplat
          clang -dynamiclib -arch arm64 -g sovereign_core.mm -o Sovereign_Elite.dylib \
          -isysroot $SDK_PATH -framework Foundation -framework UIKit -framework CoreGraphics \
          -Wno-deprecated-declarations -fobjc-arc -lc++ -Os
          
          # توليد ملف dSYM (القاموس الاستخباري لـ BugSplat)
          dsymutil Sovereign_Elite.dylib -o Sovereign_Elite.dylib.dSYM
          
      - name: "تسليم الغنائم المزدوجة"
        uses: actions/upload-artifact@v4
        with:
          name: Sovereign-Elite-Package
          path: |
            Sovereign_Elite.dylib
            Sovereign_Elite.dylib.dSYM
