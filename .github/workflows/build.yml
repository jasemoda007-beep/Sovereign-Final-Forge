name: Imperial Deep Tracer - V82.0 DELAYED HOOKS

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build_tracer:
    runs-on: macos-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Create Deep Tracer Source
        run: |
          mkdir -p jni
          cat <<'EOF' > jni/main.mm
          #import <Foundation/Foundation.h>
          #include <dlfcn.h>
          #include <sys/stat.h>
          #include <unistd.h>
          #include <pthread.h>

          #define RADAR_URL @"http://34.204.178.160:5001/ask"

          // 🛑 متغير التحكم: الرادار مطفي بالبداية لمنع الكراش
          static BOOL isTracerActive = NO;

          void IDA_Log(NSString *category, NSString *msg) {
              dispatch_async(dispatch_get_global_queue(DISPATCH_QUEUE_PRIORITY_BACKGROUND, 0), ^{
                  NSDictionary *json = @{@"category": category, @"content": msg, @"time": @"TRACE"};
                  NSURL *url = [NSURL URLWithString:RADAR_URL];
                  NSMutableURLRequest *req = [NSMutableURLRequest requestWithURL:url];
                  [req setHTTPMethod:@"POST"];
                  [req setValue:@"application/json" forHTTPHeaderField:@"Content-Type"];
                  [req setHTTPBody:[NSJSONSerialization dataWithJSONObject:json options:0 error:nil]];
                  [[[NSURLSession sharedSession] dataTaskWithRequest:req] resume];
              });
          }

          // ==========================================
          // [ محرك اللقف العميق - INTERPOSE ]
          // ==========================================
          typedef struct interpose_substitution { const void* replacement; const void* original; } interpose_substitution_t;
          #define INTERPOSE(_replacement,_original) __attribute__((used)) static const interpose_substitution_t _interpose_##_original __attribute__ ((section ("__DATA, __interpose"))) = { (const void*)(unsigned long)&_replacement, (const void*)(unsigned long)&_original };

          // 1. مراقبة dlsym (أهم دالة للـ IDA Pro)
          void* hk_dlsym(void* handle, const char* symbol) {
              // إذا ما مرت 30 ثانية، لا تسوي أي شي، بس رجع الدالة الأصلية
              if (isTracerActive && symbol) {
                  if (strstr(symbol, "ptrace") || strstr(symbol, "sysctl") || strstr(symbol, "stat") || strstr(symbol, "access") || strstr(symbol, "fork")) {
                      IDA_Log(@"dlsym 🕵️", [NSString stringWithFormat:@"الحماية تستدعي: %s", symbol]);
                  }
              }
              return dlsym(handle, symbol);
          }
          INTERPOSE(hk_dlsym, dlsym);

          // 2. مراقبة stat (فحص الملفات بـ C)
          int hk_stat(const char *path, struct stat *buf) {
              if (isTracerActive && path) {
                  if (strstr(path, "Cydia") || strstr(path, "Shadow") || strstr(path, "Substrate") || strstr(path, "dylib")) {
                      IDA_Log(@"stat 📂", [NSString stringWithFormat:@"فحص عميق للمسار: %s", path]);
                  }
              }
              return stat(path, buf);
          }
          INTERPOSE(hk_stat, stat);

          // 3. مراقبة access (صلاحيات الملفات)
          int hk_access(const char *path, int mode) {
              if (isTracerActive && path) {
                  if (strstr(path, "Cydia") || strstr(path, "Shadow") || strstr(path, "Substrate")) {
                      IDA_Log(@"access 🔒", [NSString stringWithFormat:@"فحص صلاحيات: %s", path]);
                  }
              }
              return access(path, mode);
          }
          INTERPOSE(hk_access, access);

          __attribute__((constructor))
          static void entry() {
              // ⏱️ التأخير الإمبراطوري: 30 ثانية لضمان استقرار اللعبة
              dispatch_after(dispatch_time(DISPATCH_TIME_NOW, 30 * NSEC_PER_SEC), dispatch_get_main_queue(), ^{
                  isTracerActive = YES; // تفعيل الرادار بعد الاستقرار
                  IDA_Log(@"SYSTEM 🚀", @"V82 Deep Tracer Active - عبرنا الـ 30 ثانية وجاهزين للصيد");
              });
          }
          EOF

      - name: Build V82 Tracer
        run: |
          clang++ -dynamiclib -std=c++11 -x objective-c++ \
          -isysroot $(xcrun --sdk iphoneos --show-sdk-path) \
          -arch arm64 jni/main.mm -o ImperialV82.dylib \
          -framework Foundation -lobjc

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Imperial-V82-DelayedTracer
          path: ImperialV82.dylib
          
