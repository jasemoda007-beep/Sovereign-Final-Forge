env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  

name: Build Ultimate ShadowBypass

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Theos
        uses: theos/setup-theos@v2
        with:
          arch: arm64

      - name: Create Project Files
        run: |
          mkdir -p bypass_project
          cd bypass_project
          
          # تحميل ملفات fishhook
          curl -sO https://raw.githubusercontent.com/facebook/fishhook/main/fishhook.h
          curl -sO https://raw.githubusercontent.com/facebook/fishhook/main/fishhook.c
          
          # إنشاء ملف الـ Control (ضروري جداً لعمل Theos)
          cat << 'EOF' > control
          Package: com.masoud.shadowbypass
          Name: ShadowBypass
          Depends: mobilesubstrate
          Version: 1.0.0
          Architecture: iphoneos-arm
          Description: Ultimate Bypass for ShadowTracker
          Maintainer: Masoud
          Author: Masoud
          Section: Tweaks
          EOF

          # إنشاء الـ Makefile
          cat << 'EOF' > Makefile
          ARCHS = arm64
          # استخدام SDK متوفر في بيئة GitHub
          TARGET = iphone:clang:latest:14.0 
          include $(THEOS)/makefiles/common.mk

          TWEAK_NAME = ShadowBypass
          ShadowBypass_FILES = Tweak.xm fishhook.c
          ShadowBypass_CFLAGS = -fobjc-arc

          include $(THEOS_MAKE_PATH)/tweak.mk
          EOF
          
          # إنشاء Plist الفلتر
          cat << 'EOF' > ShadowBypass.plist
          { Filter = { Bundles = ( "com.tencent.ig" ); }; }
          EOF
          
          # كتابة كود الـ Tweak.xm (نفس كودك الأصلي)
          cat << 'EOF' > Tweak.xm
          #import <Foundation/Foundation.h>
          #import <mach-o/dyld.h>
          #import <sys/mman.h>
          #import <string.h>
          #import <dlfcn.h>
          #import "fishhook.h"

          void apply_memory_patch(uint64_t ida_offset) {
              intptr_t slide = _dyld_get_image_vmaddr_slide(0);
              uintptr_t target_addr = slide + 0x100000000 + ida_offset;
              size_t page_size = sysconf(_SC_PAGESIZE);
              uintptr_t page_start = target_addr & ~(page_size - 1);
              mprotect((void*)page_start, page_size, PROT_READ | PROT_WRITE | PROT_EXEC);
              unsigned char nop_bytes[] = {0x1F, 0x20, 0x03, 0xD5};
              memcpy((void*)target_addr, nop_bytes, 4);
          }

          static void* (*original_dlsym)(void* handle, const char* symbol);
          
          const char* fake_dyld_get_image_name(uint32_t image_index) {
              const char *real_name = _dyld_get_image_name(image_index); 
              if (real_name && (strstr(real_name, "ShadowBypass") || strstr(real_name, "MobileSubstrate") || strstr(real_name, "Cydia"))) {
                  return "/usr/lib/system/libdyld.dylib";
              }
              return real_name;
          }

          const struct mach_header* fake_dyld_get_image_header(uint32_t image_index) {
              const char *real_name = _dyld_get_image_name(image_index);
              if (real_name && (strstr(real_name, "ShadowBypass") || strstr(real_name, "MobileSubstrate") || strstr(real_name, "Cydia"))) {
                  return _dyld_get_image_header(0); 
              }
              return _dyld_get_image_header(image_index);
          }
          
          char* fake_strstr(const char *haystack, const char *needle) {
              if (needle && (strcmp(needle, "frida") == 0 || strcmp(needle, "Cydia") == 0 || strcmp(needle, "Substrate") == 0)) {
                  return NULL;
              }
              return strstr(haystack, needle);
          }
          
          void* hooked_dlsym(void* handle, const char* symbol) {
              if (symbol) {
                  if (strcmp(symbol, "_dyld_get_image_name") == 0) return (void*)fake_dyld_get_image_name;
                  if (strcmp(symbol, "_dyld_get_image_header") == 0) return (void*)fake_dyld_get_image_header;
                  if (strcmp(symbol, "strstr") == 0) return (void*)fake_strstr;
              }
              return original_dlsym(handle, symbol);
          }

          __attribute__((constructor)) static void setup_all_bypass() {
              dispatch_after(dispatch_time(DISPATCH_TIME_NOW, 20 * NSEC_PER_SEC), dispatch_get_main_queue(), ^{
                  apply_memory_patch(0x68F2720); 
                  apply_memory_patch(0x68F0BC0); 
                  apply_memory_patch(0x68F2BB8); 
                  struct rebinding rebindings[] = {
                      {"dlsym", (void *)hooked_dlsym, (void **)&original_dlsym}
                  };
                  rebind_symbols(rebindings, 1);
                  NSLog(@"[+] Masoud Ultimate Bypass Injected!");
              });
          }
          EOF

      - name: Compile
        run: |
          cd bypass_project
          make FINALPACKAGE=1
          # نقل الملف لمكان واضح للرفع
          mkdir -p ../output
          cp .theos/obj/debug/*.dylib ../output/ 2>/dev/null || cp .theos/obj/*.dylib ../output/

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Masoud-Bypass-Dylib
          path: output/*.dylib
          
