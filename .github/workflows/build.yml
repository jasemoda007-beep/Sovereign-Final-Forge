            anogs_base = _dyld_get_image_vmaddr_slide(i);
            break;
        }
    }

    if (anogs_base != 0) {
        uintptr_t target = anogs_base + TARGET_ACE_OFFSET;
        uint32_t ret_instruction = 0xD65F03C0; // رصاصة RET السيادية (ARM64)
        
