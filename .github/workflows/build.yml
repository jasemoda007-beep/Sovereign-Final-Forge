name: Dragon Shadow Global Mask V10.1

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build_shadow_engine:
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Smelt Imperial C++ Code
        run: |
          mkdir -p jni
          # غيرنا الامتداد لـ .mm لحل مشكلة الـ Compiler
          cat <<'EOF' > jni/main.mm
          #include <iostream>
          #include <vector>
          #include <thread>
          #include <chrono>
          #include <unistd.h>
          #include <mach-o/dyld.h>
          #include <sys/mman.h>
          #import <Foundation/Foundation.h>
          #import <objc/runtime.h>

          using namespace std;

          namespace ImperialStealth {
              uintptr_t GetModuleBase(const char* name) {
                  uint32_t count = _dyld_image_count();
                  for (uint32_t i = 0; i < count; i++) {
                      const char* img_name = _dyld_get_image_name(i);
                      if (img_name && strstr(img_name, name)) return (uintptr_t)_dyld_get_image_header(i);
                  }
                  return (uintptr_t)_dyld_get_image_header(0);
              }

              void SilentPatch(uintptr_t base, uintptr_t offset, uint32_t instruction) {
                  uintptr_t target = base + offset;
                  long sz = getpagesize();
                  uintptr_t pg = target & ~(sz - 1);
                  if (mprotect((void*)pg, sz, PROT_READ | PROT_WRITE | PROT_EXEC) == 0) {
                      *(uint32_t*)target = instruction;
                      mprotect((void*)pg, sz, PROT_READ | PROT_EXEC);
                  }
              }
          }

          // --- [ مفرمة اللوجات: لمنع الباند المتأخر ] ---
          void CleanSecurityLogs() {
              NSArray *paths = NSSearchPathForDirectoriesInDomains(NSDocumentDirectory, NSUserDomainMask, YES);
              NSString *docDir = [paths objectAtIndex:0];
              NSArray *badPaths = @[@"/GCloud", @"/Logs", @"/Caches", @"/.system_logs"];
              NSFileManager *fm = [NSFileManager defaultManager];
              for (NSString *p in badPaths) {
                  NSString *fullPath = [docDir stringByAppendingString:p];
                  [fm removeItemAtPath:fullPath error:nil];
              }
          }

          // --- [ القناع العالمي: إجابة النسخة الرسمية ] ---
          NSString* fake_bundle_id(id self, SEL _cmd) { return @"com.tencent.ig"; }

          void SetupGlobalIntegrityMask() {
              Class nsB = objc_getClass("NSBundle");
              if (nsB) {
                  Method m = class_getInstanceMethod(nsB, @selector(bundleIdentifier));
                  if (m) { method_setImplementation(m, (IMP)fake_bundle_id); }
              }
          }

          void InitializeDragonEngine() {
              uint32_t RET = 0xD65F03C0;
              uintptr_t shadowBase = ImperialStealth::GetModuleBase("ShadowTrackerExtra");
              uintptr_t anogsBase = ImperialStealth::GetModuleBase("anogs");

              // 1. تخدير الأوفستات بداخل الشادو و anogs
              ImperialStealth::SilentPatch(shadowBase, 0x18F04C, RET); // GTrace
              ImperialStealth::SilentPatch(shadowBase, 0xE87A4, RET);  // Telemetry
              ImperialStealth::SilentPatch(anogsBase, 0x120598, RET); // anogs Scan (الهدف الذهبي)
              ImperialStealth::SilentPatch(shadowBase, 0x120598, RET); // احتياط

              // 2. تفعيل القناع العالمي لمواجهة فحص الشهادة
              SetupGlobalIntegrityMask();
              
              // 3. مسح فوري للوجات
              CleanSecurityLogs();

              printf("[🐲] V10.1: تم البناء والتخدير الشامل بنجاح!\n");
          }

          __attribute__((constructor))
          static void entry() {
              thread([]() {
                  // تأخير استراتيجي 8 ثواني لضمان فك الضغط في الرام
                  this_thread::sleep_for(chrono::seconds(8));
                  InitializeDragonEngine();
                  while(true) {
                      this_thread::sleep_for(chrono::minutes(1));
                      CleanSecurityLogs();
                  }
              }).detach();
          }
          EOF

      - name: Compile Imperial Shadow Module
        run: |
          # لاحظ استخدام -x objective-c++ وربط الـ objc
          clang++ -dynamiclib -std=c++11 \
          -x objective-c++ \
          -isysroot $(xcrun --sdk iphoneos --show-sdk-path) \
          -arch arm64 \
          jni/main.mm -o ShadowImperial.dylib \
          -framework Foundation -lobjc

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Imperial-Bypass-Final
          path: ShadowImperial.dylib
          
