    if (anogs_base != 0) {
        uintptr_t target = anogs_base + ACE_OFFSET;
        uint32_t ret_instruction = 0xD65F03C0; // رصاصة العودة RET
        mach_port_t task = mach_task_self();
        
        // [درع الصد]: استخدام VM_PROT_COPY لمنع رصد المعالج في iOS 18
        kern_return_t kr = vm_protect(task, (vm_address_t)target, 4, FALSE, VM_PROT_READ | VM_PROT_WRITE | VM_PROT_COPY);
        if (kr == KERN_SUCCESS) {
            if (vm_write(task, (vm_address_t)target, (vm_offset_t)&ret_instruction, 4) == KERN_SUCCESS) {
