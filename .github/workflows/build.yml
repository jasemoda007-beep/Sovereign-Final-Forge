name: Imperial Store Official - V78.0 NO-CLIENT-ERROR

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build_v78:
    runs-on: macos-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Create Official Source
        run: |
          mkdir -p jni
          cat <<'EOF' > jni/main.mm
          #import <Foundation/Foundation.h>
          #import <objc/runtime.h>

          #define RADAR_URL @"http://34.204.178.160:5001/ask"

          // دالة إرسال تقارير سريعة جداً (خارج مسار الهوكات)
          void FastLog(NSString *msg) {
              dispatch_async(dispatch_get_global_queue(DISPATCH_QUEUE_PRIORITY_BACKGROUND, 0), ^{
                  NSDictionary *json = @{@"category": @"OFFICIAL 🛒", @"content": msg, @"time": @"SYNC"};
                  NSURL *url = [NSURL URLWithString:RADAR_URL];
                  NSMutableURLRequest *req = [NSMutableURLRequest requestWithURL:url];
                  [req setHTTPMethod:@"POST"];
                  [req setValue:@"application/json" forHTTPHeaderField:@"Content-Type"];
                  [req setHTTPBody:[NSJSONSerialization dataWithJSONObject:json options:0 error:nil]];
                  [[[NSURLSession sharedSession] dataTaskWithRequest:req] resume];
              });
          }

          // --- 1. تزييف بيئة المتجر (App Store Environment) ---
          void SetupStoreSpoof() {
              // تزييف الـ Bundle ID
              Method m_id = class_getInstanceMethod([NSBundle class], @selector(bundleIdentifier));
              method_setImplementation(m_id, imp_implementationWithBlock(^NSString* (id self) {
                  return @"com.tencent.ig"; 
              }));

              // تزييف مسار "إيصال المتجر" - يوهم الحماية أن التطبيق مُحمل رسمياً
              Method m_receipt = class_getInstanceMethod([NSBundle class], @selector(appStoreReceiptURL));
              method_setImplementation(m_receipt, imp_implementationWithBlock(^NSURL* (id self) {
                  return [NSURL fileURLWithPath:@"/var/mobile/Containers/Data/Application/Official/receipt"];
              }));
          }

          // --- 2. درع الملفات الصامت (بدون تأخير) ---
          typedef BOOL (*fileExistsAtPath_t)(id, SEL, NSString *);
          fileExistsAtPath_t orig_fileExistsAtPath;

          BOOL hk_fileExistsAtPath(id self, SEL _cmd, NSString *path) {
              // الإنكار الفوري دون مراسلة السيرفر لتقليل التأخير (حل باند العميل)
              if ([path containsString:@"Cydia"] || [path containsString:@"Sileo"] || [path containsString:@"Shadow"] || [path containsString:@"Imperial"]) {
                  return NO;
              }
              return orig_fileExistsAtPath(self, _cmd, path);
          }

          void ActivateV78() {
              SetupStoreSpoof(); // تفعيل محاكاة المتجر

              // تفعيل درع الملفات السريع
              Method m_file = class_getInstanceMethod([NSFileManager class], @selector(fileExistsAtPath:));
              orig_fileExistsAtPath = (fileExistsAtPath_t)method_getImplementation(m_file);
              method_setImplementation(m_file, imp_implementationWithBlock(^BOOL (id self, NSString *path) {
                  return hk_fileExistsAtPath(self, @selector(fileExistsAtPath:), path);
              }));

              FastLog(@"✅ النسخة الرسمية محاكات بالكامل - تم تخطي فحص العميل");
          }

          __attribute__((constructor))
          static void entry() {
              // تأخير طويل 45 ثانية لضمان عبور فحص الاتصال الأولي للعبة
              dispatch_after(dispatch_time(DISPATCH_TIME_NOW, 45 * NSEC_PER_SEC), dispatch_get_main_queue(), ^{
                  ActivateV78();
              });
          }
          EOF

      - name: Build V78
        run: |
          clang++ -dynamiclib -std=c++11 -x objective-c++ \
          -isysroot $(xcrun --sdk iphoneos --show-sdk-path) \
          -arch arm64 jni/main.mm -o ImperialOfficial.dylib \
          -framework Foundation -lobjc

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Imperial-V78-Official
          path: ImperialOfficial.dylib
          
