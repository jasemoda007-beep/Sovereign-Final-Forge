        // [درع الصد]: فتح الذاكرة ببروتوكول COPY لمنع رصد المعالج للـ SIGKILL
        kern_return_t kr = vm_protect(task, (vm_address_t)target, 4, FALSE, VM_PROT_READ | VM_PROT_WRITE | VM_PROT_COPY);
        
        if (kr == KERN_SUCCESS) {
            if (vm_write(task, (vm_address_t)target, (vm_offset_t)&ret_instruction, 4) == KERN_SUCCESS) {
                vm_protect(task, (vm_address_t)target, 4, FALSE, VM_PROT_READ | VM_PROT_EXECUTE);
                isAceNeutralized = YES; // النصر! تم سحق الدالة
                NSLog(@"[Sovereign] ACE Neutralized Successfully at 0x%lx", target);
