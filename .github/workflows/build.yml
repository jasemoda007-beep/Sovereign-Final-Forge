name: Imperial Shield - V69.0 ANTI-BAN BYPASS

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build_shield:
    runs-on: macos-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Create Shield Source
        run: |
          mkdir -p jni
          cat <<'EOF' > jni/main.mm
          #import <Foundation/Foundation.h>
          #import <objc/runtime.h>

          // دالة الرادار للإبلاغ
          void SendReport(NSString *msg) {
              NSDictionary *json = @{@"category": @"Shield 🛡️", @"content": msg, @"time": @"LIVE"};
              NSURL *url = [NSURL URLWithString:@"http://34.204.178.160:5001/ask"];
              NSMutableURLRequest *req = [NSMutableURLRequest requestWithURL:url];
              [req setHTTPMethod:@"POST"];
              [req setValue:@"application/json" forHTTPHeaderField:@"Content-Type"];
              [req setHTTPBody:[NSJSONSerialization dataWithJSONObject:json options:0 error:nil]];
              [[[NSURLSession sharedSession] dataTaskWithRequest:req] resume];
          }

          // --- صهر الدرع (The Bypass Hook) ---
          typedef BOOL (*fileExistsAtPath_t)(id, SEL, NSString *);
          fileExistsAtPath_t orig_fileExistsAtPath;

          BOOL hk_fileExistsAtPath(id self, SEL _cmd, NSString *path) {
              // القائمة السوداء للملفات اللي تسبب باند
              NSArray *blacklist = @[@"Cydia", @"Sileo", @"Shadow", @"Substrate", @"Tweak", @"libdobby", @"Imperial"];
              
              for (NSString *item in blacklist) {
                  if ([path containsString:item]) {
                      // هنا الخدعة: اللعبة تسأل عن ملف الغش، وإحنا نجاوبها "ماكو هيج ملف"
                      SendReport([NSString stringWithFormat:@"🤫 الخداع ناجح: أنكرنا وجود %@", path]);
                      return NO; // الجواب دائماً "لا" للملفات المشبوهة
                  }
              }
              return orig_fileExistsAtPath(self, _cmd, path);
          }

          void ActivateImperialShield() {
              // 1. تزييف الهوية (Bundle ID)
              Method m1 = class_getInstanceMethod([NSBundle class], @selector(bundleIdentifier));
              method_setImplementation(m1, imp_implementationWithBlock(^NSString* (id self) { return @"com.tencent.ig"; }));

              // 2. تفعيل درع الملفات (File Shield)
              Method m2 = class_getInstanceMethod([NSFileManager class], @selector(fileExistsAtPath:));
              orig_fileExistsAtPath = (fileExistsAtPath_t)method_getImplementation(m2);
              method_setImplementation(m2, imp_implementationWithBlock(^BOOL (id self, NSString *path) {
                  return hk_fileExistsAtPath(self, @selector(fileExistsAtPath:), path);
              }));
              
              SendReport(@"✅ تم تفعيل الدرع الإمبراطوري - أنت الآن مخفي");
          }

          __attribute__((constructor))
          static void entry() {
              dispatch_after(dispatch_time(DISPATCH_TIME_NOW, 25 * NSEC_PER_SEC), dispatch_get_main_queue(), ^{
                  ActivateImperialShield();
              });
          }
          EOF

      - name: Build Shield Dylib
        run: |
          clang++ -dynamiclib -std=c++11 -x objective-c++ \
          -isysroot $(xcrun --sdk iphoneos --show-sdk-path) \
          -arch arm64 jni/main.mm -o ImperialShield.dylib \
          -framework Foundation -lobjc

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Imperial-V69-Shield
          path: ImperialShield.dylib
          
